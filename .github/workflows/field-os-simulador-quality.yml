name: Field OS Simulador Quality

on:
  pull_request:
    paths:
      - "field_os/20_product_design/PROTOTYPES/field-os-simulador-app/**"
      - ".github/workflows/field-os-simulador-quality.yml"
  push:
    paths:
      - "field_os/20_product_design/PROTOTYPES/field-os-simulador-app/**"
      - ".github/workflows/field-os-simulador-quality.yml"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: field_os/20_product_design/PROTOTYPES/field-os-simulador-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: field_os/20_product_design/PROTOTYPES/field-os-simulador-app/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Run quality gate
        run: npm run quality
