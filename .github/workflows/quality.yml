name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Repository and knowledge-base checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            mcp/requirements.txt
            scripts/quality/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r mcp/requirements.txt -r scripts/quality/requirements.txt

      - name: Run quality gate
        run: bash scripts/quality/run.sh
