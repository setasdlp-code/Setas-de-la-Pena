                                  {cmpras.map(c=>{
                                    const prov=invProveedores.find(p=>p.id===c.proveedorId);
                                    const tot=c.items.reduce((s,it)=>s+(it.kg||0)*(it.precio||0),0);
                                    return(
                                      <tr key={c.id}>
                                        <td>{c.fecha}</td>
                                        <td style={{fontFamily:"var(--font-body)",fontSize:12}}>{prov?.nombre||c.proveedorId}</td>
                                        <td>
                                          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                                            {c.items.map((it,i)=>{
                                              const g=INGS.find(x=>x.id===it.ingredienteId);
                                              return<span key={i} style={{fontFamily:"var(--font-mono)",fontSize:9,padding:'1px 5px',background:'var(--CR)',border:'1px solid var(--SL)',color:'var(--MID)',borderRadius:2}}>{g?.name||it.ingredienteId} {it.kg}kg</span>;
                                            })}
                                          </div>
                                        </td>
                                        <td style={{fontFamily:"var(--font-num)",fontSize:14,color:'var(--coral-700)'}}>${tot.toLocaleString('es-CO')}</td>
                                        <td style={{fontFamily:"var(--font-mono)",fontSize:9,color:'var(--BR)'}}>{c.fuenteCaptura}</td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            )}
                          </div>
                        );
                      });
                    })()
                  }
                </div>
              )}

              {/* ── PROVEEDORES ───────────────────────────────────────────── */}
              {invTab==='proveedores'&&(
                <div>
                  <div style={{marginBottom:12}}>
                    <button className="inv-btn inv-btn-pri" onClick={()=>setShowProvModal(true)}>＋ Agregar proveedor</button>
                  </div>
                  {invProveedores.length===0
                    ?<div style={{textAlign:'center',padding:24,fontFamily:"var(--font-mono)",fontSize:12,color:'var(--BR)'}}>Sin proveedores. Agrega el primero.</div>
                    :<div className="inv-section">
                      {invProveedores.map(p=>(
                        <div key={p.id} className="prov-row">
                          <span className="prov-tipo-chip">{p.tipo}</span>
                          <div style={{flex:1}}>
                            <div className="prov-name">{p.nombre}</div>
                            <div className="prov-muni">{p.municipio}</div>
                          </div>
                          <button className="inv-btn inv-btn-danger inv-btn-sm" onClick={()=>eliminarProveedor(p.id)}>✕</button>
                        </div>
                      ))}
                    </div>
                  }
                </div>
              )}
            </div>

            {/* MODAL NUEVO PROVEEDOR */}
            {showProvModal&&(
              <div className="inv-modal-bg" onClick={e=>{if(e.target===e.currentTarget)setShowProvModal(false);}}>
                <div className="inv-modal">
                  <div className="inv-modal-title">Nuevo Proveedor</div>
                  <div style={{marginBottom:12}}>
                    <label className="inv-label">Nombre</label>
                    <input className="inv-input" value={newProv.nombre} onChange={e=>setNewProv(p=>({...p,nombre:e.target.value}))} placeholder="Ej. Distribuidora Agro Sabana"/>
                  </div>
                  <div className="inv-row inv-row-2" style={{marginBottom:12}}>
                    <div>
                      <label className="inv-label">Tipo</label>
                      <select className="inv-input" value={newProv.tipo} onChange={e=>setNewProv(p=>({...p,tipo:e.target.value}))}>
                        {[['plaza','Plaza de mercado'],['industrial','Industrial'],['artesanal','Artesanal'],['directo','Directo / Finca'],['otro','Otro']].map(([v,l])=>(
                          <option key={v} value={v}>{l}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="inv-label">Municipio</label>
                      <input className="inv-input" value={newProv.municipio} onChange={e=>setNewProv(p=>({...p,municipio:e.target.value}))} placeholder="Ej. Tenjo"/>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                    <button className="inv-btn inv-btn-sec" onClick={()=>setShowProvModal(false)}>Cancelar</button>
                    <button className="inv-btn inv-btn-pri" onClick={agregarProveedor}>Guardar proveedor</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {tab==='dashboard'&&(
          <div>
            <div className="panel">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
                <div className="sec" style={{marginBottom:0,borderBottom:'none'}}>
                  Dashboard <span style={{fontFamily:"var(--font-mono)",fontSize:12,color:'var(--MID)',fontWeight:400}}>({saved.length} recetas)</span>
                </div>
                <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                  {['all',...Object.keys(SPP)].map(k=>(
                    <button key={k} className={`cat${dashFilter===k?' on':''}`} onClick={()=>setDashFilter(k)}>
                      {k==='all'?'Todas':SPP[k]?.name}
                    </button>
                  ))}
                </div>
              </div>
              {saved.length===0
                ?<div className="rec-empty">No hay recetas guardadas.<br/>Crea y guarda desde el Constructor.</div>
                :(()=>{
                  const filtered=saved.filter(e=>dashFilter==='all'||e.sKey===dashFilter);
                  if(!filtered.length) return <div className="sempty">Sin recetas para esta especie.</div>;
                  const sorted=[...filtered].sort((a,b)=>(parseFloat(b.eb)||0)-(parseFloat(a.eb)||0));
                  return(
                    <div className="dash-grid">
                      {sorted.map(e=>{
                        const s2=SPP[e.sKey];
                        const band=BANDS[e.sKey]||'var(--M)';
                        const eb=parseFloat(e.eb)||0;
                        const sc=e.score||0;
                        // Costo ingredientes: guardado o recalculado al vuelo
                        const costIngKg=e.cost>0?e.cost:(()=>{const a2=analyze(e.recipe,e.sKey,effectiveINGS);return a2?Math.round(a2.cost):0;})();
                        // Costo energético: guardado (recetas nuevas) o estimado por especie (recetas antiguas)
                        const eDash=e.energyCopKg!=null?e.energyCopKg:energyCostPerKgSeco(
                          ['shiitake','lions_mane','reishi','nameko'].includes(e.sKey)?'autoclave':'thermal',e.sKey);
                        const costKg=costIngKg+eDash;
                        const hFactor=e.sKey==='shiitake'||e.sKey==='lions_mane'||e.sKey==='reishi'?0.40:0.35;
                        return(
                          <div key={e.id} className="dash-card" style={{borderTopColor:band}}>
                            <div className="dash-card-top">
                              <div className="dash-card-name">{e.name}</div>
                              <div className="dash-card-spp">{s2?.name} · {e.date}</div>
                            </div>
                            <div className="dash-card-body">
                              <div className="dash-kv">
                                <span className="dk">EB estimada</span>
                                <span className="dv" style={{color:eb>=100?'var(--V)':eb>=80?'#A07828':'var(--T)'}}>{e.eb}%</span>
                              </div>
                              {sc>0&&<div className="dash-kv">
                                <span className="dk">Score</span>
                                <span className="dv" style={{color:sc>=80?'var(--V)':sc>=60?'#A07828':'var(--T)'}}>{sc}<span style={{fontFamily:"var(--font-mono)",fontSize:11,color:'var(--BR)'}}>/100</span></span>
                              </div>}
                              <div className="dash-kv">
                                <span className="dk">C:N</span>
                                <span className="dv">{e.cn}:1</span>
                              </div>
                              <div className="dash-kv">
                                <span className="dk">Ingredientes</span>
                                <span className="dv">{e.recipe.length}</span>
                              </div>
                              {costKg>0&&(
                                <div className="dash-kv">
                                  <span className="dk">Costo total/kg</span>
                                  <span className="dv" style={{color:'var(--coral-700,#7A4030)',fontFamily:'var(--font-num)',fontSize:13}} title={`Ingredientes: $${costIngKg.toLocaleString('es-CO')} + Energía proceso: $${eDash.toLocaleString('es-CO')}`}>${costKg.toLocaleString('es-CO')} COP{eDash>0&&<span style={{fontFamily:'var(--font-mono)',fontSize:9,color:'var(--MID)',marginLeft:4}}>⚡+${eDash.toLocaleString()}</span>}</span>
                                </div>
                              )}
                            </div>
                            {costKg>0&&(
                              <div style={{display:'flex',gap:0,borderTop:'1px solid var(--SL)'}}>
                                {[{icon:'🛍',nom:'20×50',kgH:1.8},{icon:'🛍',nom:'18×35',kgH:1.0},{icon:'🥊',nom:'Punch',kgH:3.5}].map(b=>(
                                  <div key={b.nom} style={{flex:1,padding:'4px 6px',borderRight:'1px solid var(--SL)',textAlign:'center',background:'var(--paper-50)'}}>
                                    <div style={{fontFamily:'var(--font-mono)',fontSize:7.5,color:'var(--MID)',marginBottom:1}}>{b.icon} {b.nom}</div>
                                    <div style={{fontFamily:'var(--font-num)',fontSize:12,color:'var(--coral-700,#7A4030)',fontWeight:700}}>${Math.round(costKg*b.kgH*hFactor).toLocaleString('es-CO')}</div>
                                    <div style={{fontFamily:'var(--font-mono)',fontSize:7,color:'var(--MID)'}}>COP/bolsa</div>
                                  </div>
                                ))}
                              </div>
                            )}
                            <div style={{padding:'4px 16px 10px',background:'var(--WH)'}}>
                              <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                                {e.recipe.slice(0,4).map(r=>{const g=INGS.find(i=>i.id===r.id);return g?<span key={r.id} style={{fontFamily:"var(--font-mono)",fontSize:9,padding:'1px 5px',background:'var(--CR)',border:'1px solid var(--SL)',color:'var(--MID)'}}>{g.name.length>15?g.name.slice(0,15)+'…':g.name} {r.p}%</span>:null;})}
                                {e.recipe.length>4&&<span style={{fontFamily:"var(--font-mono)",fontSize:9,color:'var(--BR)',padding:'1px 3px'}}>+{e.recipe.length-4} más</span>}
                              </div>
                            </div>
                            <div className="dash-card-foot">
                              <button className="sload" style={{flex:1}} onClick={()=>{loadR(e);setTab('builder');}}>↑ Cargar</button>
                              <button className="sdel" onClick={()=>delR(e.id)}>✕</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()
              }
            </div>
          </div>
        )}

        <div style={{height:40}}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);




</script>

<script>
/* ── Generador de versión offline ────────────────────────────────────── */
window.downloadOfflineVersion = async function() {
  const btn = document.getElementById('offline-dl-btn');
  const orig = btn ? btn.textContent : '';
  const st = t => { if(btn){btn.textContent=t;btn.disabled=true;} };

  try {
    // ── 1. CSS: todas las hojas cargadas → cssRules ──────────────────
    st('⏳ CSS…');
    let allCSS = Array.from(document.styleSheets).map(ss=>{
      try{return Array.from(ss.cssRules||[]).map(r=>r.cssText).join('\n');}
      catch(e){return '';}
    }).join('\n');

    // ── 2. Fuentes: detectar URLs en @font-face y convertir a base64 ──
    st('⏳ Fuentes…');
    const fontRe = /url\(["']?([^"')]+\.(?:otf|ttf|woff2|woff))["']?\)/gi;
    const fontUrls = [...new Set([...allCSS.matchAll(fontRe)].map(m=>m[1]))];
    for(const fu of fontUrls){
      try{
        const buf = await fetch(fu).then(r=>r.arrayBuffer());
        const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
        const ext = fu.split('.').pop().toLowerCase();
        const mime = ext==='woff2'?'font/woff2':ext==='woff'?'font/woff':'font/otf';
        allCSS = allCSS.split(fu).join('data:'+mime+';base64,'+b64);
      }catch(e){console.warn('Font skip:',fu,e);}
    }

    // ── 3. Scripts inline del DOM (text/babel) ────────────────────────
    const babelScripts = [...document.scripts].filter(s=>s.type==='text/babel'&&!s.src);
    const mainScript   = babelScripts.find(s=>s.textContent.length>50000)?.textContent||'';
    const tweakScript  = babelScripts.find(s=>s.textContent.includes('TweaksApp'))?.textContent||'';

    // ── 4. Archivos JS locales (fetch relativo) ───────────────────────
    st('⏳ Archivos locales…');
    const fetchText = url => fetch(url).then(r=>r.ok?r.text():'').catch(()=>'');
    const [recommenderJs, tweaksPanelJs] = await Promise.all([
      fetchText('recipe-recommender.js'),
      fetchText('tweaks-panel.jsx'),
    ]);

    // ── 5. CDN: React, ReactDOM, Babel, html2pdf ──────────────────────
    st('⏳ React…');
    const reactJs = await fetchText('https://unpkg.com/react@18.3.1/umd/react.production.min.js');
    st('⏳ ReactDOM…');
    const reactDomJs = await fetchText('https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js');
    st('⏳ Babel…');
    const babelJs = await fetchText('https://unpkg.com/@babel/standalone@7.29.0/babel.min.js');
    st('⏳ html2pdf…');
    const html2pdfJs = await fetchText('https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js');

    if(!reactJs||!babelJs){
      alert('Error: no se pudo descargar React o Babel. Verifica tu conexión a internet y vuelve a intentar.');
      if(btn){btn.textContent=orig;btn.disabled=false;} return;
    }

    // ── 6. SVG thumbnail ──────────────────────────────────────────────
    const thumbSvg = document.getElementById('__bundler_thumbnail')?.innerHTML||'';

    // ── 7. Ensamblar HTML autocontenido ───────────────────────────────
    st('⏳ Ensamblando…');
    const html = [
      '<!DOCTYPE html><html lang="es"><head>',
      '<meta charset="UTF-8">',
      '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
      '<title>Setas de la Peña — Simulador v4.0 (Offline)</title>',
      '<style>',
      allCSS,
      '/* Offline badge */',
      'body::after{content:"📴 OFFLINE";position:fixed;bottom:8px;right:8px;',
      'font-size:9px;font-family:monospace;background:#2E3B2F;color:#fff;',
      'padding:3px 7px;border-radius:4px;opacity:.45;pointer-events:none;z-index:9999;}',
      '</style>',
      '</head><body>',
      '<div id="root"></div>',
      '<div id="tweaks-root"></div>',
      '<template id="__bundler_thumbnail">'+thumbSvg+'</template>',
      '<script>'+reactJs+'<\/script>',
      '<script>'+reactDomJs+'<\/script>',
      '<script>'+babelJs+'<\/script>',
      html2pdfJs ? '<script>'+html2pdfJs+'<\/script>' : '',
      recommenderJs ? '<script>'+recommenderJs+'<\/script>' : '',
      tweaksPanelJs ? '<script type="text/babel">'+tweaksPanelJs+'<\/script>' : '',
      '<script type="text/babel">'+mainScript+'<\/script>',
      tweakScript ? '<script type="text/babel">'+tweakScript+'<\/script>' : '',
      '</body></html>',
    ].join('\n');

    // ── 8. Descargar ──────────────────────────────────────────────────
    const blob = new Blob([html],{type:'text/html;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'simulador_sustrato_v4_OFFLINE.html';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);

    st('✅ Descargado');
    setTimeout(()=>{if(btn){btn.textContent=orig;btn.disabled=false;}},3000);

  } catch(err) {
    console.error('downloadOfflineVersion error:',err);
    alert('Error al generar: '+err.message+'\nRevisa la consola (F12) para más detalles.');
    if(btn){btn.textContent=orig;btn.disabled=false;}
  }
};
</script>
