<style>
html{font-size:90%;}body{background:#fff;margin:0;padding:0;}
/* ── FIELD OS SHELL (v20) ─────────────────────────────────────── */
.topbar .wizard-desktop,.topbar .wizard-mobile,.topbar .topbar-nav{display:none!important;}
.hero{display:none!important;}
.fos-rail{position:fixed;z-index:60;background:var(--paper-50);display:flex;}
.fos-rail-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;color:var(--ink-500);position:relative;padding:13px 4px;transition:color .15s;}
.fos-rail-btn:hover{color:var(--ink-800);}
.fos-rail-btn.on{color:var(--ink-0);}
.fos-rail-btn svg{width:20px;height:20px;flex-shrink:0;}
.fos-rail-btn span{font-family:var(--font-mono);font-size:8.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.fos-rail-mark{font-family:var(--font-display);font-style:italic;font-weight:700;font-size:21px;color:var(--ink-0);text-align:center;padding:20px 0 16px;display:block;}
@media(min-width:801px){
  body{padding-left:92px;}
  .fos-rail{left:0;top:0;bottom:0;width:92px;flex-direction:column;align-items:stretch;gap:2px;border-right:1px solid var(--border-strong);}
  .fos-rail-btn.on::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:2px;background:var(--ink-0);}
}
@media(max-width:800px){
  .fos-rail{left:0;right:0;bottom:0;top:auto;flex-direction:row;border-top:1px solid var(--border-strong);padding:7px 4px calc(9px + env(safe-area-inset-bottom));}
  .fos-rail-mark{display:none;}
  .fos-rail-btn{flex:1;padding:4px 0;gap:4px;min-height:44px;}
  .wrap{padding-bottom:96px!important;}
}
.fos-chips{max-width:1280px;margin:0 auto;padding:14px 24px 0;display:flex;gap:8px;flex-wrap:wrap;}
.fos-chips button{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--border-soft);background:var(--paper-50);color:var(--ink-600);cursor:pointer;border-radius:0;transition:all .12s;}
.fos-chips button:hover{border-color:var(--ink-800);color:var(--ink-900);}
.fos-chips button.on{border-color:var(--ink-0);color:var(--paper-0);background:var(--ink-0);}
.fos-home{padding:38px 24px 70px;max-width:820px;margin:0 auto;}
.fos-eyebrow{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2);}
.fos-kicker{font-family:var(--font-display);font-weight:100;font-style:italic;font-size:24px;color:var(--ink-500);margin-top:30px;}
.fos-h1{font-family:var(--font-display);font-weight:900;font-size:54px;line-height:.98;letter-spacing:-.02em;color:var(--ink-900);margin:8px 0 0;}
.fos-home-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;}
.fos-home-art img{height:210px;width:auto;mix-blend-mode:multiply;opacity:.85;filter:saturate(.6) contrast(1.05);display:block;}
.fos-tiles{display:flex;flex-direction:column;gap:11px;margin-top:36px;}
.fos-tile{display:flex;justify-content:space-between;align-items:center;gap:14px;text-align:left;border:1px solid var(--border-strong);background:var(--paper-50);border-radius:0;padding:18px 20px;cursor:pointer;transition:border-color .15s,transform .1s;}
.fos-tile:hover{border-color:var(--ink-900);}
.fos-tile:active{transform:scale(.99);}
.fos-tile.pri{background:var(--ink-900);border-color:var(--ink-900);}
.fos-tile.pri .fos-tile-t,.fos-tile.pri .fos-tile-arrow{color:var(--paper-50);}
.fos-tile.pri .fos-tile-s{color:color-mix(in oklab,var(--paper-50) 70%,transparent);}
.fos-tile-t{font-family:var(--font-display);font-weight:700;font-size:21px;letter-spacing:-.01em;color:var(--ink-900);display:block;line-height:1.1;}
.fos-tile-s{font-family:var(--font-body);font-size:13px;color:var(--ink-500);display:block;margin-top:3px;}
.fos-tile-arrow{font-size:20px;color:var(--ink-2);flex-shrink:0;}
.fos-tile.pri .fos-tile-arrow{color:var(--paper-0);}
.fos-links{display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:26px;}
.fos-links button{background:none;border:none;padding:4px 0;cursor:pointer;font-family:var(--font-mono);font-size:11.5px;font-weight:600;letter-spacing:.06em;color:var(--link);text-decoration:underline;text-underline-offset:3px;}
.fos-links button:hover{color:var(--link-hover);}
.fos-species{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:34px;padding-top:18px;border-top:1px solid var(--border-soft);font-family:var(--font-mono);font-size:12px;color:var(--ink-600);}
.fos-species b{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--ink-900);letter-spacing:-.01em;}
.fos-species em{font-family:var(--font-display);font-style:italic;font-weight:300;color:var(--ink-500);font-size:13px;}
.fos-species-dot{width:8px;height:8px;border-radius:50%;background:var(--moss-500);box-shadow:0 0 0 3px color-mix(in oklab,var(--moss-500) 22%,transparent);flex-shrink:0;}
.fos-species button{margin-left:auto;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:7px 13px;background:transparent;color:var(--ink-0);border:1px solid var(--border-strong);cursor:pointer;border-radius:0;}
.fos-species button:hover{border-color:var(--ink-0);}
@media(max-width:600px){
  .fos-home{padding:26px 16px 50px;}
  .fos-h1{font-size:40px;}
  .fos-kicker{font-size:20px;margin-top:18px;}
  .fos-home-art{display:none;}
  .fos-tile-t{font-size:18px;}
  .fos-species button{margin-left:0;}
}
@media print{body{padding-left:0!important;}.fos-rail,.fos-chips,.fos-home{display:none!important;}}
/* ── v3 ADDITIONS ──────────────────────────────────────────────── */
.flush-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.flush-label{font-family:var(--font-mono);font-size:12px;width:74px;color:var(--ink-700);flex-shrink:0;font-weight:600;}
.flush-track{flex:1;height:20px;background:var(--paper-300);border-radius:2px;overflow:hidden;position:relative;}
.flush-fill{position:absolute;left:0;top:0;height:100%;display:flex;align-items:center;padding-left:7px;transition:width .5s cubic-bezier(0.32,0.72,0.36,1);}
.flush-day{font-family:var(--font-mono);font-size:12px;color:var(--ink-600);width:50px;flex-shrink:0;text-align:right;font-weight:500;}

.pantry-grid{display:flex;flex-wrap:wrap;gap:4px 6px;margin:10px 0;}
.pantry-chip{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;padding:5px 10px;border:1px solid var(--border-strong);border-radius:2px;background:var(--paper-100);color:var(--ink-600);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .12s;font-weight:600;}
.pantry-chip.on{border-color:var(--moss-600,var(--accent-olive));background:color-mix(in oklab,var(--accent-olive) 10%,var(--paper-50));color:var(--accent-olive);font-weight:700;}
.pantry-chip:hover{border-color:var(--coral-500);color:var(--coral-600);}

.opt-result{border:1px solid rgba(26,20,16,0.12);border-radius:0;overflow:hidden;margin-bottom:10px;background:var(--paper-50);}
.opt-result:hover{background:var(--paper-100);}
.opt-result-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--paper-300);}
.opt-rank{font-family:var(--font-mono);font-size:16px;color:var(--ink-700);width:24px;flex-shrink:0;font-weight:700;}
.opt-score{font-family:var(--font-num);font-size:34px;line-height:1;color:var(--coral-700);}
.opt-score-lbl{font-family:var(--font-mono);font-size:11px;color:var(--ink-700);font-weight:700;}
.opt-pills{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
.opt-pill{font-family:var(--font-mono);font-size:12px;padding:5px 10px;background:var(--paper-200);border:1px solid var(--ink-400);border-radius:3px;color:var(--ink-700);font-weight:600;}
.opt-load{font-family:var(--font-body);font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;background:var(--coral-500);color:#fff;border:none;border-radius:var(--r-xs);cursor:pointer;white-space:nowrap;}
.opt-load:hover{background:var(--coral-700);}
.opt-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft);border-top:none;}
.opt-met{background:var(--paper-100);padding:12px 10px;text-align:center;}
.opt-met-lbl{font-family:var(--font-body);font-weight:800;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-600);margin-bottom:5px;}
.opt-met-val{font-family:var(--font-num);font-size:22px;color:var(--ink-900);}

.spr-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--paper-300);}
.spr-row:last-child{border-bottom:none;}
.spr-rank{font-family:var(--font-mono);font-size:13px;color:var(--ink-700);width:18px;text-align:right;flex-shrink:0;font-weight:700;}
.spr-bar{width:90px;height:5px;background:var(--paper-300);border-radius:3px;overflow:hidden;flex-shrink:0;}
.spr-fill{height:100%;border-radius:3px;transition:width .4s;}
.spr-score{font-family:var(--font-num);font-size:16px;font-weight:400;min-width:32px;text-align:right;}

.ing-item{position:relative;}
.ing-quick-add{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:var(--coral-500);color:#fff;border:none;cursor:pointer;font-size:16px;line-height:1;display:none;align-items:center;justify-content:center;transition:all .15s;}
.ing-item:hover .ing-quick-add{display:flex;}
.ing-quick-add:hover{background:var(--coral-700);transform:translateY(-50%) scale(1.1);}
.ing-quick-add.added{background:var(--moss-500);}

.inv-field select,.inv-field input{width:100%;padding:10px 12px;border:1px solid var(--border-soft);border-radius:var(--r-sm);background:var(--paper-50);font-family:var(--font-body);font-size:14px;color:var(--ink-900);outline:none;}
.inv-field select:focus,.inv-field input:focus{border-color:var(--coral-500);}

.step-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-soft);}
.step-num{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--coral-500);background:color-mix(in oklab,var(--coral-200) 40%,var(--paper-50));border:1px solid var(--coral-200);border-radius:4px;padding:3px 8px;}
.step-title{font-family:var(--font-body);font-weight:800;font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-700);}

.builder-wrap{}
.builder-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
.builder-cols > *{min-width:0;}
@media(max-width:900px){.builder-cols{grid-template-columns:1fr;gap:12px;}}
@media(max-width:600px){.ing-meta{flex-wrap:wrap!important;}.ing-meta span{flex:1 1 50%!important;border-bottom:1px solid rgba(26,20,16,0.07)!important;}}
/* ── Builder sub-tabs ── */
.builder-subtabs{display:flex;gap:0;border-bottom:2px solid var(--border-soft);margin-bottom:20px;background:var(--paper-100);}
.bst{padding:13px 22px;border:none;background:none;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-400);border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s,background .15s;}
.bst.on{color:var(--coral-500);border-bottom-color:var(--coral-500);background:color-mix(in oklab,var(--coral-500) 6%,var(--paper-50,#fff));}
.bst:hover:not(.on){color:var(--ink-900);background:rgba(0,0,0,.03);}
.loaded-toast{background:var(--moss-500,var(--accent-olive));color:#fff;font-family:var(--font-mono);font-size:12px;font-weight:700;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;animation:fadeInSlide .3s ease;}
@keyframes fadeInSlide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
/* Panel visibility by sub-tab — controlled via React inline styles */
.opt-panel{margin-top:0;}
.rec-panel{margin-top:0;}

@media(max-width:900px){.builder-right{position:static!important;max-height:none!important;overflow-y:visible!important;}}
.builder-left{}
.builder-right{position:sticky;top:144px;max-height:calc(100vh - 160px);overflow-y:auto;padding-right:2px;scroll-behavior:smooth;}

/* ── BAND GAUGES ───────────────────────────────────────────────── */
.bg-wrap{padding:12px 14px 10px;background:var(--paper-50);border-bottom:1px solid var(--paper-300);margin-bottom:0;}
.bg-eyebrow{font-family:var(--font-body);font-weight:800;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-800);margin-bottom:10px;}
.bg-row{margin-bottom:9px;}
.bg-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.bg-label{font-family:var(--font-body);font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-800);}
.bg-track{position:relative;height:7px;background:var(--paper-300);border-radius:4px;overflow:visible;}
.bg-band{position:absolute;top:0;bottom:0;border-radius:3px;transition:left .4s cubic-bezier(.32,.72,.36,1),width .4s cubic-bezier(.32,.72,.36,1);}
.bg-ideal{position:absolute;top:-2px;bottom:-2px;width:1.5px;border-radius:1px;}
.bg-cursor{position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;border:2px solid var(--paper-50);transition:left .4s cubic-bezier(.32,.72,.36,1),background .3s;z-index:2;}
.bg-foot{display:flex;justify-content:space-between;margin-top:3px;}
.bg-foot span{font-family:var(--font-mono);font-size:11px;color:var(--ink-700);font-weight:700;}
.bg-val{font-family:var(--font-mono);font-size:14px;font-weight:700;transition:color .3s;color:var(--ink-900);}

.species-bridge{border-bottom:none;background:var(--slate-700);padding-top:16px;}
.bridge-inner{max-width:1280px;margin:0 auto;padding:24px 32px!important;display:flex;align-items:center!important;gap:18px!important;flex-wrap:wrap;overflow-x:hidden;}
.bridge-label{font-family:var(--font-body);font-weight:800;font-size:12.65px;letter-spacing:.18em;text-transform:uppercase;color:var(--coral-700);}
.bridge-sep{width:1px;height:14px;background:var(--border-soft);flex-shrink:0;opacity:0;}
.bridge-name{font-family:var(--font-display);font-size:29.9px;letter-spacing:-0.005em;line-height:1.1;color:var(--moss-700);}
.bridge-sci{font-family:var(--font-display);font-style:italic;font-size:21.85px;color:var(--ink-600);}
.bridge-param{font-family:var(--font-mono);font-size:14.95px;color:var(--ink-700);white-space:nowrap;}
.bridge-param em{color:var(--ink-700);margin-right:4px;font-style:normal;font-weight:700;}

.price-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--paper-300);}
.price-row:last-child{border-bottom:none;}
.price-inp{width:100px;padding:6px 9px;border:1px solid var(--border-soft);border-radius:var(--r-xs);background:var(--paper-50);font-family:var(--font-mono);font-size:13px;text-align:right;}
.price-inp.edited{border-color:var(--ochre-500);background:color-mix(in oklab,var(--ochre-200) 20%,var(--paper-50));}

.ebdial{text-align:center;padding:10px 0 4px;}
.ebdial-note{font-family:var(--font-mono);font-size:13px;color:var(--ink-800);margin-top:6px;text-align:center;font-weight:600;}
.print-header{display:none;}
@media print{
  /* Oculta TODO el documento via visibility (se hereda a hijos) */
  body * { visibility: hidden; }
  /* Muestra solo la hoja de producción y todo su contenido */
  .prod-sheet, .prod-sheet * { visibility: visible; }
  .prod-sheet {
    position: absolute !important;
    top: 0 !important; left: 0 !important;
    width: 100% !important;
    border: none !important;
    box-shadow: none !important;
    margin: 0 !important;
    padding: 20px 24px !important;
  }

/* Species grid — fixed 3 columns, generous gap */
.spp-grid{grid-template-columns:repeat(3,1fr)!important;gap:24px!important;}

.p-stats{display:grid;margin-top:auto;}

.p-chip-arr svg{color:var(--coral-500);}
/* Spp-info — Hoja de herbario */
.spp-info-2col{display:grid;grid-template-columns:1fr 1.15fr;gap:0;background:var(--paper-50);border:1px solid var(--ink-900);box-shadow:4px 4px 0 rgba(26,20,16,0.05),0 6px 24px rgba(26,20,16,0.09);margin-top:32px;scroll-margin-top:80px;overflow:hidden;}
.spp-info-left{display:flex;flex-direction:column;border-right:1px solid rgba(26,20,16,0.1);min-height:480px;}
.spp-info-top{padding:32px 28px 20px;flex:1;}
.spp-info-center{background:var(--paper-50);overflow:hidden;position:relative;}
.spp-info-right{display:none;}
.spp-info-sci{font-family:var(--font-sci);font-style:italic;font-size:17.5px;color:var(--slate-600);margin-bottom:4px;}
.spp-info-name{font-family:var(--font-display);font-size:53.9px;font-weight:400;letter-spacing:-.02em;color:var(--moss-900);line-height:1.0;margin-bottom:14px;}
.spp-info-desc{font-size:9px;line-height:1.6;color:var(--ink-700);text-wrap:pretty;margin-bottom:20px;}
.spp-info-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;filter:saturate(.65) contrast(1.05);mix-blend-mode:multiply;padding:32px 28px;box-sizing:border-box;}
/* Detail rows: Apariencia / Sabor / Usos */
.spp-detail-rows{display:flex;flex-direction:column;gap:14px;}
.spp-detail-row{display:flex;gap:10px;align-items:flex-start;}
.spp-detail-ico{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(26,20,16,0.12);color:var(--ink-500);}
.spp-detail-txt .k{font-family:var(--font-body);font-weight:800;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-700);margin-bottom:3px;}
.spp-detail-txt .v{font-size:15px;color:var(--ink-700);line-height:1.5;}
/* Franja de parámetros — anotaciones de campo al fondo */
.spp-field-strip{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid rgba(26,20,16,0.1);}
.spp-field-cell{padding:14px 14px 12px;border-right:1px solid rgba(26,20,16,0.07);display:flex;flex-direction:column;gap:5px;}
.spp-field-cell:last-child{border-right:none;}
.spp-field-lbl{font-family:var(--font-body);font-weight:800;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-500);}
.spp-field-val{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--ink-900);line-height:1.2;}
/* Fila CTA */
.spp-cta-row{padding:14px 28px;border-top:2px solid var(--slate-700,var(--accent-blue-grey));display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--slate-700,var(--accent-blue-grey));}
.spp-cta-note{font-family:var(--font-sci);font-style:italic;font-size:15px;color:var(--paper-0);line-height:1.4;font-weight:600;}
.spp-cta{font-family:var(--font-body);font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:12px 20px;background:var(--paper-50);color:var(--moss-900);border:none;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;border-radius:var(--r-xs);}
.spp-cta:hover{background:var(--coral-100);}
.spp-info-cta{font-family:var(--font-body);font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:14px 22px;background:var(--ink-900);color:var(--paper-50);border:none;cursor:pointer;transition:all .15s;width:100%;margin-top:14px;text-align:center;}
.spp-info-cta:hover{background:var(--ink-1);}
.p-body{padding-bottom:10px!important;}

/* ── v5 MOBILE OVERRIDES ─────────────────────────────────────── */
@media(max-width:768px){
  /* Species grid: 2 cols on mobile (override the 3-col !important) */
  .spp-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px!important;}

  /* Stat rows inside cards: stack temp/ph/co on narrow */
  .p-stats-3{grid-template-columns:repeat(3,1fr);} /* keep 3-col, just smaller text */
  .p-stat{padding:6px 8px;}
  .p-stat-lbl{font-size:6px;letter-spacing:.1em;}
  .p-stat-val{font-size:9px;}
  .p-stats-foot{grid-template-columns:1fr 1fr auto;}
  .p-stat-radio{padding:6px 10px;}
  .p-radio{width:11px;height:11px;}

  /* Bridge: stack on mobile */
  .bridge-inner{
    flex-wrap:wrap!important;
    padding:10px 16px!important;
    gap:6px 14px!important;
    align-items:baseline!important;
  }
  .bridge-activo{font-size:8px;}
  .bridge-name{font-size:13px!important;}
  .bridge-sci{font-size:11px!important;display:none!important;}
  /* Hide bridge stats on very small screens, show only name */
  .bridge-inner > div[style]{margin-left:0!important;flex-wrap:wrap;gap:14px!important;}
  .bridge-stat-val{font-size:11px;}
  .bridge-stat-lbl{font-size:6.5px;}
}

@media(max-width:480px){
  /* Single col cards on very narrow screens */
  .spp-grid{grid-template-columns:1fr!important;}

  /* Bridge sticky + compact en móvil */
  .species-bridge{position:sticky!important;top:0!important;z-index:200!important;}
  .bridge-inner{padding:8px 14px!important;gap:8px 10px!important;}
  .bridge-activo{font-size:7px!important;}
  /* Bridge stats: hide on very small screens, keep button always visible */
  .bridge-stats-group{display:none!important;}
  .bridge-cambiar{display:inline-flex!important;margin-left:auto!important;}
  .bridge-sci{display:none!important;}
  .bridge-name{font-size:13px!important;}
}

/* ══════════════════════════════════════════════════════
   v5 MOBILE COMPREHENSIVE — arreglos globales
   ══════════════════════════════════════════════════════ */
@media(max-width:768px){

  /* 1. Nav: topbar holds dropdown */
  .topbar-nav{ margin-left:auto; }

  /* 2. Mode switcher: scroll horizontal, sin wrap */
  .mode-switcher{ overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap; position:relative; }
  .mode-btn{ font-size:18px; padding:9px 16px; flex-shrink:0; }
  .mode-sep{ flex-shrink:0; }

  /* 3. Sub-tabs: scroll horizontal, sin overflow */
  .sub-tabs{ overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap!important; padding:0 8px; position:relative; }
  .sub-tab{ flex-shrink:0; white-space:nowrap; }
  .sub-sep{ flex-shrink:0; }

  /* 3b. Indicador de scroll horizontal: mismo gradiente que .cats, aplicado también a subtabs y mode-switcher */
  .builder-subtabs, .sub-tabs, .mode-switcher{ position:relative; }
  .builder-subtabs::after, .sub-tabs::after, .mode-switcher::after{
    content:''; position:absolute; right:0; top:0; bottom:0; width:32px;
    background:linear-gradient(to right, transparent 0%, rgba(246,244,236,0.95) 100%);
    pointer-events:none; z-index:10;
  }

  /* 4. Inv subtab bar: idem */
  .inv-subtab-bar{ flex-wrap:wrap!important; overflow-x:visible!important; padding-bottom:0; }
  .inv-subtab{ flex-shrink:0; }

  /* 5. Builder sticky: desactivar en móvil */
  .builder-right{ position:static!important; max-height:none!important; overflow-y:visible!important; }

  /* 6. Línea de margen del cuaderno: ocultar en móvil */
  .wrap::before{ display:none!important; }

  /* 7. Inventory stat bar: 2 columnas */
  .inv-stat-row{ grid-template-columns:1fr 1fr!important; }
  .inv-stat-val{ font-size:22px; }

  /* 8. Formularios inventario: colapsar columnas */
  .inv-row-2{ grid-template-columns:1fr!important; }
  .inv-row-3{ grid-template-columns:1fr 1fr!important; }
  .inv-row-4{ grid-template-columns:1fr 1fr!important; gap:8px!important; }

  /* 9. Optimizer result metrics: 2×2 */
  .opt-metrics{ grid-template-columns:1fr 1fr!important; }

  /* 10. Comparador: 1 col */
  .cgrid{ grid-template-columns:1fr!important; }

  /* 11. Recipe row: ingrediente rediseñado como flexbox column */
  .rec-row{ display:flex!important; flex-direction:column!important; gap:8px!important; padding:12px 14px!important; }

  /* 12. Hero: ocultar ilustración */
  .hero-art{ display:none!important; }
  .hero-inner{ grid-template-columns:1fr!important; }

  /* 13. Topbar: compactar */
  .topbar{ padding:0 12px!important; height:50px!important; }
  .topbar-mark{ font-size:18px!important; }
  .topbar-right{ display:none; }

  /* 14. Wrap: sin padding lateral (paneles ya tienen el suyo); conserva el padding-bottom que reserva espacio para el rail fijo */
  .wrap{ padding:0 0 96px!important; }

  /* 15. Panels: padding reducido */
  .panel, .spp-sect{ padding:14px!important; margin-bottom:12px!important; }

  /* 16. Search/inputs: font 16px evita zoom en iOS */
  .search, .sbar input, .inv-input, .inv-field input, .inv-field select, .bf input, .price-inp, .rec-pct-input{ font-size:16px!important; }

  /* 16c. Bridge en móvil: mover botón a nueva fila, nunca ocultar */
  .bridge-inner{flex-wrap:wrap!important;overflow-x:visible!important;}
  .bridge-inner > div[style]{margin-left:0!important;flex-wrap:wrap!important;display:flex!important;gap:12px!important;width:100%!important;}
  .bridge-cambiar{display:inline-flex!important;}

  /* 16b. Species detail card: stack en móvil */
  .cat-modal-bg{padding:0!important;align-items:flex-end!important;}
  .cat-modal-box{max-height:92vh!important;border-radius:12px 12px 0 0!important;overflow-y:auto!important;}
  .spp-info-2col{grid-template-columns:1fr!important;overflow-y:visible!important;}
  .spp-info-left{min-height:unset!important;border-right:none!important;border-bottom:1px solid rgba(26,20,16,0.1)!important;}
  .spp-info-top{padding:20px 18px 16px!important;}
  .spp-info-center{min-height:unset!important;overflow:visible!important;}
  .spp-img-wrap{min-height:280px!important;max-height:380px!important;}
  .spp-info-img{position:relative!important;inset:auto!important;height:auto!important;width:100%!important;object-fit:contain!important;max-height:380px!important;padding:16px 12px!important;}
  .spp-info-name{font-size:32px!important;margin-bottom:10px!important;}
  .spp-info-sci{font-size:14px!important;}
  .spp-field-strip{grid-template-columns:repeat(3,1fr)!important;}
  .spp-field-cell:nth-child(n+4){display:none!important;}
  .spp-cta-row{flex-direction:column!important;align-items:center!important;gap:10px!important;padding:14px 18px!important;text-align:center!important;}
  .spp-cta{width:100%!important;text-align:center!important;}
  /* Keep "Formular" CTA always visible at bottom of scrolling modal */
  .spp-info-center .spp-cta-row{position:sticky!important;bottom:0!important;z-index:10!important;}
  .cat-modal-close{top:10px!important;right:10px!important;}

  /* 17. Presets: scroll horizontal */
  .presets{ flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
  .pre{ flex-shrink:0; }

  /* 18. Cats filter: scroll horizontal */
  .cats{ flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; position:relative; }
  .cats::after{ content:''; position:absolute; right:0; top:0; bottom:0; width:40px; background:linear-gradient(to right, transparent 0%, rgba(246,244,236,0.95) 100%); pointer-events:none; z-index:10; }
  .cat{ flex-shrink:0; }

  /* 19. Ingredient list: altura razonable */
  .ing-list{ max-height:340px; }

  /* 20. Info row especie */
  .info-row{ gap:12px; padding-left:8px; }
  .kv .v{ font-size:18px; }

  /* 21. Opt result: pills wrap + botones visibles */
  .opt-result-head{ flex-wrap:wrap; gap:8px; }
  .opt-pills{ min-width:100%; order:3; }
  .opt-result-head > div:last-child{ order:4; width:100%; display:flex!important; flex-direction:row!important; gap:6px!important; }
  .opt-result-head > div:last-child .opt-load{ flex:1; text-align:center; }

  /* 22. Price row: apilar */
  .price-row{ flex-direction:column; align-items:flex-start; gap:4px; }
  .price-inp{ width:100%!important; }

  /* 23. Modal: full ancho */
  .inv-modal{ width:calc(100vw - 24px)!important; padding:16px!important; }
  .inv-modal-bg{ padding-top:50px; }

  /* 24. Botones de acción: ancho completo */
  .act-row{ flex-direction:column; gap:8px; }
  .act-row .btn, .act-row .inv-btn{ width:100%; justify-content:center; }

  /* 25. Métricas de receta: 2 col */
  .mgrid{ grid-template-columns:1fr 1fr!important; }

  /* 26. Band gauges */
  .bg-wrap{ padding:10px 12px 8px; }

  /* 27. Flush bars */
  .flush-label{ width:60px; font-size:8px; }

  /* 28. Receta activa: % input y controles con objetivo táctil mayor */
  .rec-pct-input{ min-height:38px!important; padding:8px!important; }
  .rem{ padding:8px 12px!important; font-size:15px!important; }
  .lock-btn{ padding:7px 9px!important; font-size:14px!important; }
}

/* ── FAB: salto rápido entre Ingredientes ↔ Receta activa en Formular (móvil) ── */
.mobile-quickjump{display:none;position:fixed;right:16px;bottom:20px;z-index:65;align-items:center;gap:6px;padding:13px 18px;border-radius:999px;background:var(--ink-900);color:var(--paper-50);border:none;font-family:var(--font-mono);font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;box-shadow:0 6px 18px rgba(26,20,16,.3);cursor:pointer;}
.mobile-quickjump:active{transform:scale(.96);}
@media(max-width:900px){.mobile-quickjump{display:inline-flex;}}
@media(max-width:800px){.mobile-quickjump{bottom:calc(78px + env(safe-area-inset-bottom));}}

/* ── Hoja de Producción: compactar en móvil (screen-only, no afecta impresión) ── */
@media screen and (max-width:900px){
  .prod-sheet{ padding:16px 14px!important; }
  .ps-head{ flex-direction:column; gap:10px; }
  .ps-head-right{ text-align:left!important; }
  .ps-kpi{ grid-template-columns:repeat(3,1fr)!important; }
  .ps-kpi > div{ padding:8px 4px!important; }
  .ps-tbl-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -14px; padding:0 14px; }
  .ps-tbl-wrap .prod-tbl{ min-width:600px; font-size:12px; }
  .ps-3col{ grid-template-columns:1fr!important; gap:8px!important; }
  .ps-fechas-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -14px; padding:0 14px; }
  .ps-fechas{ min-width:max-content!important; }

}

@media(max-width:400px){

  .inv-row-3{ grid-template-columns:1fr!important; }
  .mode-btn{ font-size:15px!important; padding:8px 12px!important; }
  /* Mobile wizard: dots only + step name */

  .wizard-mobile{display:flex!important;}
}

/* ── v6.0: NAV DROPDOWN (in topbar) ─────────────────────────── */
.topbar-mark{font-family:var(--font-display);letter-spacing:-.01em;}
.topbar-nav{position:relative;display:flex;align-items:center;margin-left:auto;}
.nav-dd-btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-body);font-weight:800;font-size:12.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--coral-500);background:transparent;border:1px solid rgba(255,255,255,.18);border-radius:var(--r-xs);padding:6px 11px;cursor:pointer;transition:border-color .15s,background .15s;}
.nav-dd-btn:hover{background:rgba(255,255,255,.08);border-color:var(--coral-500);}
.nav-dd-btn svg{transition:transform .2s;flex-shrink:0;}
.nav-dd-btn.open svg{transform:rotate(180deg);}
.nav-dd-panel{position:absolute;top:calc(100% + 8px);right:0;background:var(--paper-50);border:1px solid var(--border-soft);border-radius:var(--r-sm);box-shadow:0 6px 24px rgba(0,0,0,.14);min-width:200px;padding:6px 0;z-index:200;}
.nav-dd-group{font-family:var(--font-body);font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#B8614D!important;padding:8px 16px 4px;}
.nav-dd-item{display:block;width:100%;text-align:left;font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-800);background:none;border:none;cursor:pointer;padding:9px 16px;transition:background .1s,color .1s;}
.nav-dd-item:hover{background:var(--paper-100);color:var(--coral-500);}
.nav-dd-item.on{color:var(--coral-500);background:var(--paper-100);}
.nav-dd-sep{height:1px;background:var(--border-soft);margin:5px 0;}
/* ── PAGE TITLE BAR ──────────────────────────────────────────── */
.page-title-bar{padding:12px 24px 0;max-width:1280px;margin:0 auto;}
.page-title-eyebrow{font-family:var(--font-body);font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-700);display:block;margin-bottom:6px;}
.page-title-h{font-family:var(--font-display);font-size:38px;color:#D4C5A9;margin:0;font-weight:400;line-height:1;}
.page-title-rule{height:1.5px;width:36px;background:var(--coral-500);opacity:.65;margin:10px 0 18px;}
/* ── v6.0: BODEGA BAR ─────────────────────────────────────── */
.bodega-bar{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--paper-100);border:1px solid var(--border-soft);border-radius:var(--r-sm);margin-bottom:8px;}
.bodega-bar-icon{font-size:14px;flex-shrink:0;line-height:1;}
.bodega-bar-title{font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--ink-800);line-height:1.2;}
.bodega-bar-sub{font-family:var(--font-mono);font-size:10px;color:var(--ink-700);margin-top:3px;font-weight:600;}
.bodega-bar-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.bodega-bar-link{font-family:var(--font-mono);font-size:11px;color:var(--coral-500);background:none;border:none;cursor:pointer;padding:3px 8px;text-decoration:underline;text-underline-offset:2px;white-space:nowrap;font-weight:600;}
.bodega-bar-link:hover{color:var(--coral-700);}
.pantry-chip-kg{font-family:var(--font-mono);font-size:9px;color:var(--accent-olive);opacity:.8;font-weight:400;margin-left:1px;}
/* ── v6.0: STOCK DOTS ─────────────────────────────────────── */
.ing-stock-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;flex-shrink:0;}
.ing-stock-kg{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:8px;background:#e8f0e0;color:#3a5a28;margin-left:3px;}
@media(max-width:600px){
  .page-title-bar{padding:16px 16px 0;}
  .page-title-h{font-size:28px;}
}
/* ── PERITO OPTIMIZER (priority items) ─────────────────────────── */
.pi-critical{--pi-color:var(--coral-500);}
.pi-warning{--pi-color:var(--ochre-700,#A07828);}
.pi-tip{--pi-color:#4A6B4A;}
.pi-info{--pi-color:var(--ink-700);}
.perito-item{display:grid;grid-template-columns:36px 1fr auto;gap:0;border-bottom:1px solid var(--paper-300);align-items:start;}
.pi-icon-col{display:flex;align-items:center;justify-content:center;padding:11px 4px;border-right:1px solid var(--paper-300);}
.pi-icon{font-family:var(--font-mono);font-size:8px;font-weight:700;padding:2px 4px;border:1.5px solid var(--pi-color);color:var(--pi-color);text-align:center;line-height:1.3;min-width:24px;display:inline-block;}
.pi-body{padding:10px 12px;}
.pi-head{display:flex;gap:6px;align-items:center;margin-bottom:3px;flex-wrap:wrap;}
.pi-label{font-family:var(--font-body);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pi-color);}
.pi-delta{font-family:var(--font-mono);font-size:10px;color:var(--ink-700);background:var(--paper-300);padding:2px 7px;border-radius:3px;font-weight:600;}
.pi-action{font-size:12px;color:var(--ink-900);margin-bottom:2px;line-height:1.5;}
.pi-effect{font-size:11px;color:var(--ink-700);font-family:var(--font-mono);line-height:1.5;}
.pi-actions{padding:10px 10px 10px 0;display:flex;align-items:center;}
.pi-apply{font-family:var(--font-body);font-size:10px;font-weight:700;padding:5px 10px;background:var(--pi-color);color:#fff;border:none;border-radius:var(--r-sm);cursor:pointer;white-space:nowrap;letter-spacing:.04em;transition:opacity .15s;}
.pi-apply:hover{opacity:.85;}
.pi-spacer{width:60px;}

/* ── INGREDIENT ITEMS → CARD STYLE (like species cards) ─────── */
.ing-list{
  display:flex!important;
  flex-direction:column!important;
  gap:5px!important;
  border-top:none!important;
  padding:2px!important;
}

/* Wrapper div around each IngredientItem — becomes the card shell */
.ing-list > div{
  border-radius:4px!important;
  border:1px solid rgba(26,20,16,0.11)!important;
  box-shadow:0 1px 4px rgba(26,20,16,0.05)!important;
  /* NO overflow:hidden here — absolute-positioned buttons live in this wrapper */
  transition:box-shadow .15s,transform .15s!important;
  background:var(--paper-50)!important;
}
.ing-list > div:hover{
  box-shadow:0 4px 12px rgba(26,20,16,0.09)!important;
  transform:translateY(-1px)!important;
}

/* Card row — overflow:hidden here clips the left strip corners */
.ing-item{
  padding:0!important;
  border-bottom:none!important;
  background:transparent!important;
  display:flex!important;
  align-items:stretch!important;
  gap:0!important;
  overflow:hidden!important;
  border-radius:4px!important;
}

const analyze=(recipe,sKey,ings=INGS)=>{
  if(!recipe.length) return null;
  const tot=recipe.reduce((s,r)=>s+(parseFloat(r.p)||0),0);if(!tot) return null;
  let wC=0,wN=0,wPh=0,wDig=0,wCra=0,nP=0,suppP=0,baseP=0,addP=0,cafeP=0,manP=0,airP=0,densaP=0,incompat=[];
  const DENSOS=['aserrin_roble','aserrin_eucalipto','aserrin_pino','aserrin_pino_compostado','borra_cafe','afrecho_cerveceria','chips_poda_urbana','guadua','carton_corrugado','pulpa_papel'];
  recipe.forEach(r=>{
    const g=ings.find(i=>i.id===r.id);if(!g) return;
    const p=parseFloat(r.p)||0;
    // A · Aislamiento de la matriz nutritiva: los aditivos minerales/estructurales secos
    // (carbonato, yeso, zeolita, cascarilla de huevo, vermicompost…) NO entran en la
    // relación C:N — se usan solo como modificadores de pH y textura. Evita el sesgo de
    // dilución del denominador lignocelulósico.
    const esAditivoSeco=(g.role==='aditivo_ph'||g.role==='aditivo_estructura');
    // C:N BASE SECA: los valores c/n de la BD son % materia seca → ponderar por fracción seca
    // para corregir diferencias de humedad entre insumos (borra café 60% vs paja 12%).
    const dryFrac=p*(1-Math.min(0.92,Math.max(0,(g.moisture||0)/100)));
    if(g.cn>0&&!esAditivoSeco){wC+=g.c*dryFrac;wN+=g.n*dryFrac;nP+=dryFrac;}
    wPh+=g.ph*p; wDig+=g.dig*p; wCra+=g.cra*p;
    if(g.role==='suplemento_n') suppP+=p;
    if(g.role==='base_carbono') baseP+=p;
    if(['aditivo_ph','aditivo_estructura','aditivo_micronutriente'].includes(g.role)) addP+=p;
    if(g.role==='aireador') airP+=p;
    if(g.cat==='cafe') cafeP+=p;
    if(g.cat==='est') manP+=p;
    if(DENSOS.includes(g.id)) densaP+=p;
    if(sKey&&!g.cs.includes(sKey)&&g.cn>0) incompat.push(g.name);
  });
  const avgN=nP?wN/nP:0,cn=avgN>0?(nP?wC/nP:0)/avgN:0;
  const avgPh=tot?wPh/tot:7;
  const avgDig=tot?wDig/tot:5;
  const avgCra=tot?wCra/tot:3;
  const cost=recipe.reduce((s,r)=>{const g=ings.find(i=>i.id===r.id);return g?s+(g.cost*(parseFloat(r.p)||0)/100):s;},0);
  const sp=SPP[sKey];let eb=0,trichoderma=false,dynSpawn=sp?.spawn_rate||8;
  if(sp){
    const cF=Math.max(0,1-Math.pow(Math.abs(cn-sp.cn_optimal.ideal)/((sp.cn_optimal.max-sp.cn_optimal.min)/2),1.5));
    const nF=Math.max(0,1-Math.pow(Math.abs(avgN-sp.n_optimal.ideal)/((sp.n_optimal.max-sp.n_optimal.min)/2),1.5));
    eb=sp.eb_baseline+(sp.eb_optimal-sp.eb_baseline)*(cF*.6+nF*.4);
    const needsAutoclave=suppP>sp.supplementation_max;
    const nThresh=needsAutoclave?sp.n_optimal.max*1.2:sp.n_optimal.max*1.15;
    if(avgN>nThresh&&!needsAutoclave){trichoderma=true;eb*=.45;}
    else if(avgN>nThresh&&needsAutoclave){eb*=.80;}

// ── PERITO CUANTITATIVO: fija un ingrediente a un % y reescala los demás a 100% ──
const setPctProportional=(recipe,id,v,lockedIds=[])=>{
  v=Math.max(0,Math.min(80,v));
  const others=recipe.filter(r=>r.id!==id);
  const lockedSum=others.filter(r=>lockedIds.includes(r.id)).reduce((s,r)=>s+(parseFloat(r.p)||0),0);
  const free=others.filter(r=>!lockedIds.includes(r.id));
  const sumFree=free.reduce((s,r)=>s+(parseFloat(r.p)||0),0);
  const remaining=Math.max(0,100-v-lockedSum);
  let found=false;const next=[];
  recipe.forEach(r=>{
    if(r.id===id){next.push({...r,p:Math.round(v*10)/10});found=true;}
    else if(lockedIds.includes(r.id)){next.push(r);}
    else{const np=sumFree===0?(remaining/Math.max(1,free.length)):(parseFloat(r.p)/sumFree)*remaining;next.push({...r,p:Math.round(np*10)/10});}
  });
  if(!found) next.push({id,p:Math.round(v*10)/10});
  return next;
};
// Busca el % exacto de un ingrediente que lleva una métrica (cn|n|ph) a su objetivo
const solveTargetPct=(recipe,sKey,ings,id,metric,target,lockedIds=[])=>{
  const readM=a=>!a?null:(metric==='cn'?a.cn:metric==='n'?a.avgN:a.avgPh);
  let best=null,bestDist=Infinity;
  const evalAt=v=>{const cand=setPctProportional(recipe,id,v,lockedIds);const a=analyze(cand,sKey,ings);const val=readM(a);if(val==null) return;const d=Math.abs(val-target);if(d<bestDist){bestDist=d;best={pct:Math.round(v*10)/10,val,an:a};}};
  for(let v=0.5;v<=55;v+=1) evalAt(v);
  if(best){const c=best.pct;for(let v=Math.max(0,c-1.5);v<=c+1.5;v+=0.1) evalAt(v);}
  return best;
};
const METRIC_LABEL={cn:'C:N',n:'N',ph:'pH'};
const fmtMetric=(metric,v)=>metric==='cn'?`${v.toFixed(1)}:1`:metric==='n'?`${v.toFixed(2)}%`:v.toFixed(1);

// ── v13: calcRiskScore — penalizaciones por factores de riesgo real ──
const calcRiskScore=(recipe,an,sKey,treatment,ings=INGS)=>{
  if(!an||!an.sp) return 50;
  const sp=an.sp;
  let pen=0;
  if(an.trichoderma) pen+=35;
  if(an.suppP>sp.supplementation_max&&treatment&&treatment.col!=='autoclave') pen+=20;
  else if(an.suppP>sp.supplementation_max) pen+=8;
  if(an.cafeP>25) pen+=12;
  else if(an.cafeP>20) pen+=5;
  if(an.densaP>60&&an.airP<10) pen+=15;
  else if(an.densaP>40&&an.airP<8) pen+=8;
  if(sp.ph_optimal){
    if(an.avgPh<sp.ph_optimal.min-0.5||an.avgPh>sp.ph_optimal.max+0.5) pen+=12;
    else if(an.avgPh<sp.ph_optimal.min||an.avgPh>sp.ph_optimal.max) pen+=5;
  }
  if(an.incompat&&an.incompat.length>0) pen+=an.incompat.length*5;
  if(treatment&&treatment.col==='cwlp'&&an.suppP>12) pen+=10;
  if(an.tot<97||an.tot>103) pen+=5;
  return Math.max(0,100-pen);
};

// ── v13: normalizeRecipe — rebalancear a 100% respetando bloqueos ──
const normalizeRecipe=(rec,lockedIds=[])=>{
  const locked=rec.filter(r=>lockedIds.includes(r.id));
  const free=rec.filter(r=>!lockedIds.includes(r.id));
  const lockedSum=locked.reduce((s,r)=>s+(parseFloat(r.p)||0),0);
  const freeSum=free.reduce((s,r)=>s+(parseFloat(r.p)||0),0);
  const remaining=Math.max(0,100-lockedSum);
  if(freeSum<=0) return rec;
  return rec.map(r=>{
    if(lockedIds.includes(r.id)) return r;
    return {...r,p:Math.round(((parseFloat(r.p)||0)/freeSum)*remaining*10)/10};
  });
};

// ── v13: calcMaxBatchFromStock — kg húmedos máximos producibles con bodega ──
const calcMaxBatchFromStock=(recipe,stockMap,batchKgWet=10,hObj=65,ings=INGS)=>{
  const dry=batchKgWet*(1-hObj/100);
  let max=Infinity;
  recipe.forEach(r=>{
    const g=ings.find(x=>x.id===r.id);
    if(!g) return;
    const dryNeed=dry*(r.p/100);
    const wetNeed=dryNeed/(1-Math.min(0.92,(g.moisture||0)/100));
    const available=stockMap[g.id]||0;
    if(wetNeed>0) max=Math.min(max,available/wetNeed);
  });
  return Number.isFinite(max)?Math.floor(max*batchKgWet):0;
};

// Reescribe un item del Perito con el % objetivo exacto y la predicción
const quantifyItem=(item,recipe,sKey,ings,lockedIds)=>{
  if(!item.apply||!item.apply.id||!item._solve) return item;
  const {metric,target}=item._solve;const id=item.apply.id;
  const g=ings.find(i=>i.id===id);if(!g) return item;
  const res=solveTargetPct(recipe,sKey,ings,id,metric,target,lockedIds);
  if(!res) return item;
  const cur=recipe.find(r=>r.id===id);const curP=cur?parseFloat(cur.p)||0:0;
  const verb=!cur?'Agregar':res.pct>curP?'Subir':'Bajar';
  item.action=`${verb} <b>${g.name}</b> a <b>${res.pct}%</b>${cur?` (actual ${curP.toFixed(0)}%)`:' (nuevo)'}`;
  item.delta=`→ ${METRIC_LABEL[metric]} ${fmtMetric(metric,res.val)}`;
  item.apply={mode:'set',id,value:res.pct};
  return item;
};

    if(ing) items.push({priority:'warning',icon:subir?'→N':'→C',
      label:'Afinar C:N al ideal',
      action:`${inRec?'Subir %':'Agregar'} <b>${ing.name}</b> en 3–5%`,
      effect:`C:N ${an.cn.toFixed(1)}:1 · ideal ${sp.cn_optimal.ideal}:1 · acercarse al centro sube EB ~${Math.round(cnDist*15)}%`,
      delta:`+${Math.round(cnDist*15)}% EB estimada`,
      apply:{mode:inRec?'increase':'add',id:ing.id,delta:4}});
  }
  const nDist=Math.abs(an.avgN-sp.n_optimal.ideal)/Math.max(0.01,sp.n_optimal.max-sp.n_optimal.min);
  if(nDist>0.10&&an.avgN>=sp.n_optimal.min&&an.avgN<=sp.n_optimal.max){
    const subir=an.avgN<sp.n_optimal.ideal;
    const ing=subir
      ? bestStock(g=>g.n>=2&&g.role!=='base_carbono',(a,b)=>a.cost-b.cost)
      : bestStock(g=>g.cn>60&&g.role==='base_carbono',(a,b)=>b.cn-a.cn);
    const inRec=recipe?.find(r=>ing&&r.id===ing.id);
    if(ing) items.push({priority:'warning',icon:subir?'→N+':'→N-',
      label:'Afinar Nitrógeno',
      action:`${subir?(inRec?'Aumentar':'Agregar'):'Reducir'} <b>${ing.name}</b> en 3–5%`,
      effect:`N ${an.avgN.toFixed(2)}% · ideal ${sp.n_optimal.ideal}% · diferencia del ${Math.round(nDist*100)}% del rango`,
      delta:`N → ${sp.n_optimal.ideal}% (+EB)`,
      apply:{mode:subir?(inRec?'increase':'add'):'decrease',id:ing.id,delta:4}});
  }
  if(an.eb<sp.eb_optimal*0.95&&an.suppP<sp.supplementation_max-3){
    const margen=sp.supplementation_max-an.suppP;
    const ing=bestStock(g=>g.n>=2&&g.role==='suplemento_n',(a,b)=>a.cost-b.cost);
    const inRec=recipe?.find(r=>ing&&r.id===ing.id);
    if(ing){const d=Math.min(8,Math.round(margen));items.push({priority:'warning',icon:'↑EB',
      label:'Potencial de EB sin explotar',
      action:`${inRec?'Aumentar':'Agregar'} <b>${ing.name}</b> ${d}% · quedan ${Math.round(margen)}% de margen seguro`,
      effect:`EB actual ${an.eb.toFixed(0)}% · máximo especie ${sp.eb_optimal}% · suplementación dentro de límite seguro`,
      delta:`EB ${an.eb.toFixed(0)}% → ~${Math.min(sp.eb_optimal,an.eb+Math.round(margen*1.5)).toFixed(0)}%`,
      apply:{mode:inRec?'increase':'add',id:ing.id,delta:d}});}
  }
  if(sp.ph_optimal){
    const phIdeal=(sp.ph_optimal.min+sp.ph_optimal.max)/2;
    const phDist=Math.abs(an.avgPh-phIdeal)/Math.max(0.01,sp.ph_optimal.max-sp.ph_optimal.min);
    if(phDist>0.08&&an.avgPh>=sp.ph_optimal.min&&an.avgPh<=sp.ph_optimal.max){
      const subir=an.avgPh<phIdeal;
      const ajuste=subir
        ? bestStock(g=>g.ph>7.5,(a,b)=>b.ph-a.ph)
        : bestStock(g=>g.ph<6,(a,b)=>a.ph-b.ph);
      items.push({priority:'tip',icon:subir?'pH+':'pH-',
        label:'Centrar pH',
        action:ajuste?`Agregar <b>${ajuste.name}</b> 1–2% adicional`:(subir?'Agregar CaCO₃ 0.5–1%':'Agregar borra de café 5–8%'),
        effect:`pH ${an.avgPh.toFixed(1)} · centro ideal ${phIdeal.toFixed(1)} · pH centrado mejora rendimiento enzimático ~5%`,
        delta:`pH ${an.avgPh.toFixed(1)} → ${phIdeal.toFixed(1)}`,
        apply:ajuste?{mode:'add',id:ajuste.id,delta:2}:null});
    }
  }
  if(an.cost>800){
    const alt=bestStock(g=>g.role==='suplemento_n'&&g.cost<700&&g.n>=1.5,(a,b)=>a.cost-b.cost);
    if(alt) items.push({priority:'tip',icon:'$↓',
      label:'Oportunidad de costo',
      action:`<b>${alt.name}</b> ($${alt.cost}/kg, N=${alt.n}%) como suplemento parcial en bodega`,
      effect:`Costo actual $${Math.round(an.cost)}/kg · sustitución parcial puede bajar 20–30%`,
      delta:`$${Math.round(an.cost)} → ~$${Math.round(an.cost*0.75)}/kg`,
      apply:null});
  }
  if(an.addP<2){
    const m=bestStock(g=>g.role==='aditivo_ph')||INGS.find(g=>g.role==='aditivo_ph'&&g.cs.includes(sKey));
    if(m) items.push({priority:'tip',icon:'Ca',
      label:'Sin mineral estabilizador',
      action:`Agregar <b>${m.name}</b> 1–2% · bajo costo, alto impacto`,
      effect:`Sin minerales detectados · CaCO₃ estabiliza pH y aporta calcio para pared celular del micelio`,
      delta:'pH más estable · micelio más vigoroso',
      apply:{mode:'add',id:m.id,delta:2}});
  }
  if(an.avgDig<6){
    const dig=bestStock(g=>g.dig>=7&&g.role==='base_carbono',(a,b)=>b.dig-a.dig);
    if(dig) items.push({priority:'tip',icon:'Dig',
      label:'Baja digestibilidad',
      action:`Incorporar <b>${dig.name}</b> (dig. ${dig.dig}/10) reemplazando parte de la base`,
      effect:`Digestibilidad ${an.avgDig.toFixed(1)}/10 · sustrato difícil para el micelio · pajas finas mejoran colonización`,
      delta:`Dig. ${an.avgDig.toFixed(1)} → ${dig.dig}/10`,
      apply:{mode:'add',id:dig.id,delta:10}});
  }
  // Nota altitud
  items.push({priority:'info',icon:'⛰',
    label:'Tenjo 2.600 msnm',
    action:'Pasteurización: extender tiempo +25% (agua hierve ~92°C). CWLP: verificar pH≥12 antes de sumergir.',
    effect:'La altitud no afecta incubación ni fructificación — solo el tratamiento térmico.',
    delta:null,apply:null});

  // ── CUANTIFICACIÓN: asigna métrica objetivo por ícono y resuelve el % exacto ──
  if(recipe&&recipe.length){
    const phIdeal=sp.ph_optimal?(sp.ph_optimal.min+sp.ph_optimal.max)/2:null;
    items.forEach(it=>{
      if(!it.apply||!it.apply.id) return;
      const ic=it.icon||'';
      let solve=null;
      if(ic==='→N'||ic==='→C'||ic.indexOf('C:N')>=0) solve={metric:'cn',target:sp.cn_optimal.ideal};
      else if(ic.toLowerCase().indexOf('ph')>=0&&phIdeal!=null) solve={metric:'ph',target:phIdeal};
      else if(ic.indexOf('N')>=0) solve={metric:'n',target:sp.n_optimal.ideal};
      if(solve){it._solve=solve;quantifyItem(it,recipe,sKey,ings,lockedIds);delete it._solve;}
    });
  }
  // ── Score: usa la misma fórmula matizada del Constructor (an.recipeScore) ──
  // para evitar el caso 100/100 cuando el Constructor calcula 86. Si por alguna
  // razón an.recipeScore no existe, caemos al cálculo por conteo como respaldo.
  // ── v13: enriquecer ítems con "por qué" y "riesgo si no se corrige" ──
  const WHY_MAP={'↓C:N':'La relación C:N determina velocidad de colonización y rendimiento. Alto C:N = carbono sin aprovechar.','↑C:N':'C:N bajo = exceso de nitrógeno, el nutriente que activa mohos competidores.','↑N':'El nitrógeno es el nutriente limitante para el crecimiento del micelio.','↓N':'Exceso de N activa bacterias y Trichoderma que colonizan más rápido que el micelio.','⚠':'Trichoderma colapsa el bloque — compite más rápido que cualquier micelio de seta.','↑pH':'pH ácido bloquea enzimas hidrolíticas del micelio que degradan la lignina.','↓pH':'pH alcalino inhibe el crecimiento y favorece bacterias contaminantes.','↑EB':'EB no explotada = dinero en el sustrato que el hongo no puede aprovechar.','Ca':'Sin minerales, el pH cae durante la incubación y el micelio pierde vigor a mitad del ciclo.','$↓':'El costo de ingredientes es el mayor gasto variable de la producción.','Dig':'Baja digestibilidad requiere más energía del micelio, aumentando el riesgo de contaminación.','→N':'N y C:N están relacionados: ajustar uno afecta el otro en la misma receta.','→C':'La base de carbono define la estructura física y el C:N base del sustrato.'};
  const RISK_MAP={'↓C:N':'Colonización lenta, EB reducida, mayor ventana de contaminación.','↑C:N':'Exceso de N → bacterias → olor a amoniaco → contaminación del lote completo.','↑N':'EB reducida 30–50%. En casos extremos, colapso completo del bloque.','↓N':'Sin corrección: probabilidad alta de Trichoderma y pérdida del lote.','⚠':'Sin autoclave: pérdida del lote completo en 5–10 días de colonización.','↑pH':'Colonización parcial, EB reducida, mayor riesgo bacteriano.','↓pH':'Bloqueo enzimático completo en pH>8 para la mayoría de Pleurotus.','↑EB':'Receta subóptima — EB 20–40% menor a lo posible con los ingredientes disponibles.','Ca':'pH variable lote-a-lote — resultados inconsistentes.','Dig':'Colonización 50–100% más lenta; mayor riesgo de contaminación por exposición prolongada.','→N':'EB por debajo del potencial óptimo de la especie.','→C':'C:N alejado del ideal reduce la eficiencia biológica estimada.'};
  items.forEach(it=>{
    if(!it.why&&WHY_MAP[it.icon]) it.why=WHY_MAP[it.icon];
    if(!it.riskIfIgnored&&RISK_MAP[it.icon]) it.riskIfIgnored=RISK_MAP[it.icon];
  });
  const criticals=items.filter(s=>s.priority==='critical').length;
  const warnings=items.filter(s=>s.priority==='warning').length;
  // ── v13: score compuesto (recipeScore + ebIndex + riskScore + treatmentScore + balance + stock) ──
  const tr13=calcTreatment(an,sKey);
  const riskScore13=calcRiskScore(recipe,an,sKey,tr13,ings);
  const ebIndex13=an.ebIndex||0;
  const treatmentScore13=(()=>{
    if(!tr13) return 50;
    if(an.trichoderma&&tr13.col==='autoclave') return 100;
    if(an.trichoderma&&tr13.col!=='autoclave') return 10;
    if(an.suppP>=(an.sp?.supplementation_max||20)&&tr13.col==='autoclave') return 95;
    if(an.suppP>12&&tr13.col==='cwlp') return 40;
    return 80;
  })();
  const totalBalanceScore13=an.tot>=99&&an.tot<=101?100:an.tot>=97&&an.tot<=103?70:40;
  const stockScore13=stockIds.size===0?100:(()=>{
    const inStock=recipe.filter(r=>stockIds.has(r.id)).length;
    return Math.round((inStock/Math.max(1,recipe.length))*100);
  })();
  let score=Math.round(
    0.30*(an.recipeScore||0)+
    0.25*ebIndex13+
    0.20*riskScore13+
    0.10*treatmentScore13+
    0.10*totalBalanceScore13+
    0.05*stockScore13
  );
  if(criticals>0) score=Math.min(score,55);
  else if(warnings>0) score=Math.min(score,88);
  // Garantía: si la receta es casi-óptima pero no hay tips útiles, sugerir refinamiento mineral.
  const hasTips=items.some(s=>s.priority==='tip');
  if(score>=85&&!hasTips&&recipe&&recipe.length){
    const mineral=INGS.filter(g=>g.role==='aditivo_ph'&&g.cs.includes(sKey))[0];
    if(mineral&&!recipe.find(r=>r.id===mineral.id)){
      items.push({priority:'tip',icon:'Ca',
        label:'Afinar con mineral estabilizador',
        action:`Agregar <b>${mineral.name}</b> 1–2% · estabiliza pH durante toda la incubación`,
        effect:`Receta ya óptima · CaCO₃ amortigua la caída de pH por ácidos del micelio y reduce variabilidad lote-a-lote`,
        delta:'pH estable +5% consistencia EB',
        apply:{mode:'add',id:mineral.id,delta:2}});
    } else {
      items.push({priority:'tip',icon:'$↓',
        label:'Refinamiento de costo',
        action:'Revisar si algún suplemento se puede sustituir por un residuo local más barato sin perder N',
        effect:`Receta dentro de óptimo · oportunidad es bajar costo manteniendo C:N y N`,
        delta:null,apply:null});
    }
  }
  const status=score>=85?'excellent':score>=65?'good':score>=40?'needs_work':'critical';
  return{score,status,items};
};

// ── Costos energéticos de procesamiento (COP / kg de sustrato húmedo) ──
// Autoclave  : ~3.5 kWh / ciclo 90 min (resistencia 3.5 kW) ÷ 15 kg por ciclo × $800 COP/kWh ≈ 187 COP/kg
// Pasteuriz. : agua+resistencia ~0.8 kWh/kg sustrato (calentado + mantenimiento 6–8h) × $800 ≈ 640 COP/kg
// CWLP       : cal + agua fría → consumo eléctrico despreciable ≈ 0 COP/kg
// Tarifa eléctrica Tenjo (estrato 1–2 industria pequeña): ~$800 COP/kWh (jun 2026)
const ENERGY_COST={
  autoclave:{cop_per_kg_humedo:187,kwh_per_kg:.234,detalle:'Autoclave 3.5 kW · ciclo 90 min · 15 kg/ciclo · tarifa $800/kWh'},
  thermal:  {cop_per_kg_humedo:640,kwh_per_kg:.800,detalle:'Resistencia + agua · 6–8 h · sostenida 65–75°C núcleo · tarifa $800/kWh'},
  cwlp:     {cop_per_kg_humedo:0,  kwh_per_kg:0,   detalle:'Cal en frío — sin consumo eléctrico significativo'},
};
// Factor húmedo→seco para convertir costo/kg húmedo a costo/kg seco (≈ HR objetivo)
// Pleurotus: H~65% → kg_seco = kg_humedo × 0.35
// Madera (shiitake, lions_mane, reishi, nameko): H~60% → kg_seco = kg_humedo × 0.40
const energyCostPerKgSeco=(col,sKey)=>{
  const e=ENERGY_COST[col];if(!e) return 0;
  const hFactor=['shiitake','lions_mane','reishi','nameko'].includes(sKey)?0.40:0.35;
  return Math.round(e.cop_per_kg_humedo/hFactor);
};

const calcTreatment=(a,sKey)=>{
  if(!a) return null;
  const{suppP,manP,cafeP,avgN,trichoderma,dynSpawn}=a;const sp=SPP[sKey];
  let score=0,reasons=[];
  if(trichoderma){score+=3;reasons.push('⚠ Colapso Trichoderma — N crítico sin esterilización');}
  if(suppP>(sp?.supplementation_max||20)){score+=2;reasons.push(`Supl ${suppP.toFixed(0)}% > máx`);}
  else if(suppP>15){score+=1;reasons.push('Supl alta');}
  if(avgN>2.5){score+=2;reasons.push(`N ${avgN.toFixed(2)}%`);}
  else if(avgN>1.8){score+=1;reasons.push('N elevado');}
  if(['shiitake','lions_mane','reishi','nameko'].includes(sKey)){score+=2;reasons.push(`${sp?.name} requiere esterilización`);}
  if(manP>20){score+=1;reasons.push('Estiércol alto');}
  if(cafeP>0&&cafeP<=30){score-=.5;reasons.push('Café pre-pasteurizado');}
  const spawn=dynSpawn||sp?.spawn_rate||8;
  const ec=col=>({...ENERGY_COST[col],cop_per_kg_seco:energyCostPerKgSeco(col,sKey)});
  if(score>=2) return{name:'Esterilización en Autoclave',temp:'121°C / 15 PSI',time:'90–120 min',spawn,col:'autoclave',reasons,prep:'Empacar bolsas, esterilizar, enfriar 4–6h antes de inocular.',alt:'△ Tenjo: la presión del autoclave compensa altitud. Mantener 15 PSI constante.',energy:ec('autoclave')};
  if(score>=.5) return{name:'Pasteurización Térmica',temp:'Núcleo 65–75°C',time:'6–8 h (base 5–6 h +25% altitud)',spawn,col:'thermal',reasons,prep:'Sumergir el sustrato y sostener el NÚCLEO entre 65–75°C de forma constante. Verificar con termómetro de pincho en el centro de la masa, no solo el agua.',alt:'△ Tenjo (2.580 msnm): el agua hierve a ~91°C, por lo que la transferencia de calor al núcleo es más lenta — se aplica un factor de +25% sobre el tiempo de receta estándar para garantizar pasteurización efectiva en el centro.',energy:ec('thermal')};
  return{name:'CWLP — Cal en Frío',temp:'Ambiente (~14°C Tenjo)',time:'18–24 h inmersión',spawn,col:'cwlp',reasons,prep:'150–200 g cal / 100 L agua. Sumergir, escurrir, inocular.',alt:'△ Tenjo: CWLP funciona independiente de altitud. Verificar pH≥12 antes de sumergir.',energy:ec('cwlp')};
};

// B · Balance de masas húmedas industrial.
// Convierte la receta teórica (% base seca) en órdenes de pesado reales en báscula,
// derivando la masa seca del objetivo de humedad del lote y la humedad intrínseca de
// cada insumo comercial. Cierra el balance al peso húmedo objetivo exacto.
const calcBatch=(recipe,n,kg,hObj=67,spawnCostKg=12000,ings=INGS,dynSpawn=8)=>{
  if(!recipe.length||!n||!kg) return null;
  const wet=n*kg;                                   // sustrato húmedo final objetivo (kg)
  const hF=Math.min(0.85,Math.max(0.40,hObj/100));  // fracción de humedad objetivo
  const dry=wet*(1-hF);                             // masa seca total requerida (kg)
  const spawnRate=Math.min(0.15,Math.max(0.05,dynSpawn/100));
  const items=recipe.map(r=>{
    const g=ings.find(i=>i.id===r.id);if(!g) return null;
    const masaSeca=dry*(parseFloat(r.p)/100);       // aporte seco del insumo
    const m=Math.min(0.92,Math.max(0,(g.moisture||0)/100)); // humedad intrínseca
    const kr=masaSeca/(1-m);                         // kg comerciales reales a pesar en báscula
    const aguaOculta=kr*m;                           // agua que ya trae el insumo
    return{name:g.name,kr,masaSeca,aguaOculta,cost:kr*g.cost,unit:kr<.5?`${Math.round(kr*1000)} g`:`${kr.toFixed(2)} kg`};
  }).filter(Boolean);
  const aguaTot=dry*(hF/(1-hF));                     // agua total que debe contener la mezcla
  const aguaInh=items.reduce((s,i)=>s+i.aguaOculta,0); // agua aportada por los insumos
  const agua=Math.max(0,aguaTot-aguaInh);            // agua neta a inyectar (L ≈ kg)
  const kgComercialTotal=items.reduce((s,i)=>s+i.kr,0); // peso total a pesar (base húmeda comercial)
  const sustCost=items.reduce((s,i)=>s+i.cost,0);
  const spawnKg=wet*spawnRate;
  const spawnCostTotal=spawnKg*spawnCostKg;
  const totalCost=sustCost+spawnCostTotal;
  const costPerBag=n>0?totalCost/n:0;
  return{items,wet,dry,kgComercialTotal,aguaTot,aguaInh,cost:sustCost,spawn:spawnKg,spawnCostTotal,totalCost,costPerBag,agua,hObj};
};

const calcSchedule=(sKey,dateStr,eb)=>{
  const sp=SPP[sKey];if(!sp||!dateStr) return null;
  const base=new Date(dateStr+'T12:00:00');
  const add=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const fmt=d=>d.toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short'});
  const T={p_ostreatus_gris:{c50:12,c100:22,pr:28,f1:35,f2:52,f3:68},p_ostreatus_blanco:{c50:14,c100:26,pr:32,f1:40,f2:57,f3:74},p_djamor_rosa:{c50:14,c100:28,pr:34,f1:42,f2:59,f3:76},p_eryngii:{c50:18,c100:32,pr:40,f1:48,f2:66,f3:84},shiitake:{c50:30,c100:55,pr:75,f1:90,f2:115,f3:140},lions_mane:{c50:20,c100:35,pr:42,f1:50,f2:68,f3:86},reishi:{c50:25,c100:50,pr:80,f1:120,f2:160,f3:200},enoki:{c50:15,c100:28,pr:35,f1:42,f2:58,f3:74},nameko:{c50:20,c100:38,pr:48,f1:60,f2:80,f3:100}};
  const d=T[sKey]||T.p_ostreatus_gris;
  const adj=n=>Math.round(n/Math.max(.85,Math.min(1.2,(eb||100)/100)));
  const evts=[
    {key:'in',type:'inoculation',day:0,title:'Inoculación',detail:`Empacar bolsas. Spawn ${sp.spawn_rate}%.`},
    {key:'c5',type:'normal',day:adj(d.c50),title:'Colonización 50%',detail:'Micelio blanco visible en la bolsa.'},
    {key:'c1',type:'normal',day:adj(d.c100),title:'Colonización completa',detail:`Pasar a cámara de fructificación. ${sp.temp_fruit}.`},
    {key:'pr',type:'normal',day:adj(d.pr),title:'Primordios',detail:'HR 90–95%. Abrir bolsa o cortar.'},
    {key:'f1',type:'harvest',day:adj(d.f1),title:'Primera cosecha',detail:`~${eb?(eb*.55).toFixed(0):'?'}% EB.`},
    {key:'f2',type:'harvest',day:adj(d.f2),title:'Segunda cosecha',detail:`~${eb?(eb*.35).toFixed(0):'?'}% EB.`},
    {key:'f3',type:'harvest',day:adj(d.f3),title:'Tercera cosecha',detail:'Evaluar si compostar el bloque.'}
  ];
  return{evts:evts.map(e=>({...e,ds:fmt(add(base,e.day))})),tot:adj(d.f3),first:fmt(add(base,adj(d.f1))),inc:adj(d.c100)};
};

  if(!tr) return null;
  const wet=(numBags*kgBag).toFixed(1);
  const guides={

      {n:1,t:'Prepara el baño de pasteurización',d:`Calienta agua para sumergir ${wet} kg de sustrato. Usa termómetro calibrado de pincho. En Tenjo (2.580 msnm) el agua hierve a ~91°C: el calor llega más lento al núcleo, por eso se trabaja por tiempo extendido y se mide el centro de la masa, no solo el agua.`},

      {n:3,t:'Pasteuriza por núcleo',d:`Sostén el NÚCLEO del sustrato entre 65–75°C durante 6–8 h (base 5–6 h +25% por altitud). Clava el termómetro en el centro de la masa y verifica cada 20 min — el agua puede estar más caliente que el núcleo. No superes 80°C: por encima se esteriliza de más y se pierde la microbiota protectora.`},
      {n:4,t:'Enfría tapado',d:'Escurre y deja enfriar en lugar limpio tapado con plástico. No muevas hasta que esté <30°C (mínimo 3–4 h en ambiente Tenjo 14°C).'},
      {n:5,t:'Prueba de campo',d:'Aprieta un puñado — debe caer máximo 1–2 gotas de agua. Si chorrea, escurre más. Si no sale nada, agrega agua.'},
      {n:6,t:'Inocula',d:`Spawn rate: ${tr.spawn}%. Mezcla bien o distribuye en capas. Cierra con polyfil o filtro. Registra fecha y lote.`},
    ],
    cwlp:[
      {n:1,t:'Prepara la solución de cal',d:`Disuelve 150–200 g de cal hidratada por cada 100 L de agua. Mezcla bien y verifica pH ≥ 12 con tira indicadora (pH 12–13 es el rango activo contra patógenos). A 2.580 msnm CWLP funciona igual que a nivel del mar — independiente de temperatura.`},
      {n:2,t:'Sumerge el sustrato',d:`Introduce ${wet} kg de sustrato. Usa pesos para mantenerlo sumergido. Todo debe estar en contacto con la solución — sin partes secas.`},

      {n:4,t:'Escurre y neutraliza',d:'Saca y escurre bien. Si el pH final del sustrato es >9, enjuaga brevemente con agua limpia. El pH objetivo del sustrato escurrido es 7–8.'},
      {n:5,t:'Punto de campo',d:'Misma prueba: 1–2 gotas al apretar. En Tenjo el aire seco acelera el secado — a veces hay que agregar agua después del escurrido.'},
      {n:6,t:'Inocula',d:`Spawn rate: ${tr.spawn}%. Inocula máximo 2–3 h después de escurrir. Tiempo de exposición al aire aumenta riesgo de recontaminación.`},
    ],
  };
  const steps=guides[tr.col]||[];
  return(
    <div style={{marginTop:14,background:'var(--paper-200)',border:'1px solid var(--border-soft)',padding:'18px'}}>

};

const RadarChart=({an,cAn,sKey,cmpKey})=>{
  if(!an||!an.sp) return null;
  const spA=an.sp,spB=cAn&&cAn.sp?cAn.sp:spA;
  const norm=(v,min,max)=>Math.min(1,Math.max(0,(v-min)/(max-min||1)));
  const axes=[
    {label:'C:N',va:norm(an.cn,spA.cn_optimal.min,spA.cn_optimal.max*(1+0.3)),vb:cAn?norm(cAn.cn,spB.cn_optimal.min,spB.cn_optimal.max*(1+0.3)):0,inv:true},
    {label:'N%',va:norm(an.avgN,spA.n_optimal.min*0.5,spA.n_optimal.max*1.3),vb:cAn?norm(cAn.avgN,spB.n_optimal.min*0.5,spB.n_optimal.max*1.3):0,inv:false},
    {label:'EB%',va:norm(an.eb,spA.eb_baseline*0.5,spA.eb_optimal*1.1),vb:cAn?norm(cAn.eb,spB.eb_baseline*0.5,spB.eb_optimal*1.1):0,inv:false},
    {label:'Costo',va:1-norm(an.cost,0,3000),vb:cAn?1-norm(cAn.cost,0,3000):0,inv:false},
    {label:'pH',va:an.sp.ph_optimal?norm(an.avgPh,an.sp.ph_optimal.min,an.sp.ph_optimal.max):0.5,vb:cAn&&cAn.sp&&cAn.sp.ph_optimal?norm(cAn.avgPh,cAn.sp.ph_optimal.min,cAn.sp.ph_optimal.max):0.5,inv:false},
    {label:'Digest.',va:norm(an.avgDig,0,10),vb:cAn?norm(cAn.avgDig,0,10):0,inv:false},
  ];
  const N=axes.length;const cx=150,cy=150,r=100;
  const angle=(i)=>((i*2*Math.PI)/N)-Math.PI/2;
  const pt=(i,v)=>[cx+r*v*Math.cos(angle(i)),cy+r*v*Math.sin(angle(i))];
  const rings=[0.25,0.5,0.75,1];
  const polyA=axes.map((ax,i)=>pt(i,ax.va)).map(p=>p.join(',')).join(' ');
  const polyB=axes.map((ax,i)=>pt(i,ax.vb)).map(p=>p.join(',')).join(' ');
  const [fullscreen,setFullscreen]=React.useState(false);
  
  const RadarSVG=({size=260})=>(
    <svg viewBox="0 0 300 300" width={size} height={size} style={{overflow:'visible'}}>
      {rings.map(rv=>(
        <polygon key={rv} points={axes.map((_,i)=>pt(i,rv).join(',')).join(' ')}
          fill="none" stroke="var(--border-soft)" strokeWidth={rv===1?1.5:0.8} strokeDasharray={rv<1?'3,3':'none'}/>
      ))}
      {axes.map((_,i)=>(
        <line key={i} x1={cx} y1={cy} x2={pt(i,1)[0]} y2={pt(i,1)[1]} stroke="var(--border-soft)" strokeWidth="0.8"/>
      ))}
      <polygon points={polyA} fill="rgba(184,97,77,0.15)" stroke="#B8614D" strokeWidth="2" strokeLinejoin="round"/>
      {cAn&&<polygon points={polyB} fill="rgba(42,90,139,0.12)" stroke="#2A5A8B" strokeWidth="2" strokeLinejoin="round" strokeDasharray="5,3"/>}
      {axes.map((ax,i)=>{const p=pt(i,1.18);const ta=Math.cos(angle(i))>0.1?'start':Math.cos(angle(i))<-0.1?'end':'middle';return(
        <text key={i} x={p[0]} y={p[1]} textAnchor={ta} dominantBaseline="middle"
          fontFamily="var(--font-body)" fontSize="9" fill="var(--ink-500)" letterSpacing=".08em" textTransform="uppercase">
          {ax.label}
        </text>
      );})}
      {axes.map((ax,i)=>{const pa=pt(i,ax.va);return(
        <circle key={i} cx={pa[0]} cy={pa[1]} r="3.5" fill="#B8614D"/>
      );})}
      {cAn&&axes.map((ax,i)=>{const pb=pt(i,ax.vb);return(
        <circle key={i} cx={pb[0]} cy={pb[1]} r="3" fill="none" stroke="#2A5A8B" strokeWidth="2"/>
      );})}
      <circle cx={cx} cy={cy} r="3" fill="var(--border-soft)"/>
      <rect x="6" y="6" width="10" height="10" fill="rgba(184,97,77,0.3)" stroke="#B8614D" strokeWidth="1.5"/>
      <text x="20" y="14" fontFamily="var(--font-mono)" fontSize="9" fill="var(--ink-900)">Receta A</text>
      {cAn&&<><rect x="6" y="22" width="10" height="2" fill="none" stroke="#2A5A8B" strokeWidth="2" strokeDasharray="4,2"/><text x="20" y="27" fontFamily="var(--font-mono)" fontSize="9" fill="var(--ink-900)">Receta B</text></>}
    </svg>
  );
  
  if(fullscreen) return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:20}}>
      <button onClick={()=>setFullscreen(false)} style={{position:'absolute',top:20,right:20,fontSize:28,background:'none',border:'none',color:'#fff',cursor:'pointer'}}>✕</button>
      <RadarSVG size={600}/>
      <div style={{fontFamily:'var(--font-body)',fontSize:14,color:'#fff',textAlign:'center'}}>Presiona Esc o haz clic en ✕ para cerrar</div>
    </div>
  );
  
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'20px 0 10px',background:'var(--paper-200)',marginBottom:14}}>
      <RadarSVG size={260}/>
      <button onClick={()=>setFullscreen(true)} style={{marginTop:12,fontFamily:'var(--font-body)',fontSize:10,fontWeight:700,padding:'6px 12px',background:'var(--coral-500)',color:'#fff',border:'none',borderRadius:'var(--r-sm)',cursor:'pointer',letterSpacing:'.04em'}}>⛶ Pantalla completa</button>
    </div>
  );
};

const NitrogenChart=({recipe})=>{
  if(!recipe||!recipe.length) return null;
  const items=recipe.map(r=>{
    const g=INGS.find(i=>i.id===r.id);
    if(!g||!g.cn||!g.n) return null;
    const contrib=g.n*(parseFloat(r.p)||0)/100;
    return contrib>0?{name:g.name,contrib}:null;
  }).filter(Boolean).sort((a,b)=>b.contrib-a.contrib);
  const total=items.reduce((s,i)=>s+i.contrib,0);
  if(!total||items.length===0) return null;
  const PAL=['#B8614D','var(--accent-olive)','#A07828','#2A5A8B','#7A4A6B','#3A7A5A','#8A6020','#4A6A8A','#5A3A7A','#2A6A5A'];
  return(
    <div style={{marginBottom:20,background:'var(--paper-100)',border:'1px solid var(--border-soft)',padding:'14px 16px'}}>
      <div style={{fontFamily:"var(--font-body)",fontSize:10,letterSpacing:'.2em',textTransform:'uppercase',color:'var(--ink-500)',marginBottom:10}}>Contribución de Nitrógeno por ingrediente</div>
      <div style={{height:18,display:'flex',borderRadius:2,overflow:'hidden',marginBottom:11,border:'1px solid rgba(0,0,0,.07)'}}>
        {items.map((it,i)=>(
          <div key={i} title={`${it.name}: ${((it.contrib/total)*100).toFixed(1)}% del N total`}
            style={{width:`${(it.contrib/total)*100}%`,background:PAL[i%PAL.length],transition:'width .35s',minWidth:it.contrib/total>0.01?2:0}}/>
        ))}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:'5px 16px'}}>
        {items.map((it,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:9,height:9,background:PAL[i%PAL.length],flexShrink:0,border:'1px solid rgba(0,0,0,.1)'}}/>
            <span style={{fontFamily:"var(--font-mono)",fontSize:11,color:'var(--ink-700)',fontWeight:500}}>
              {it.name.length>22?it.name.slice(0,22)+'…':it.name}&nbsp;<strong style={{color:'var(--ink-900)'}}>{((it.contrib/total)*100).toFixed(1)}%</strong>

          </div>

      </div>
      <div style={{marginTop:9,fontFamily:"var(--font-mono)",fontSize:10,color:'var(--ink-600)',borderTop:'1px solid var(--paper-300)',paddingTop:7}}>
        N absoluto en sustrato: {total.toFixed(3)} g/100g (masa seca)
      </div>
    </div>
  );
};

// ── v3: CompositionChart — stacked bar by role ──
const CompositionChart=({recipe})=>{
  if(!recipe||!recipe.length) return null;
  const ROLE_LABELS={base_carbono:'Base C',suplemento_n:'Supl. N',suplemento_medio:'Supl. Medio',aireador:'Aireador',aditivo_ph:'pH',aditivo_estructura:'Estructura',aditivo_micronutriente:'Micronut.',aditivo_arrancador:'Arrancador'};
  const ROLE_COLORS={base_carbono:'#5A7042',suplemento_n:'#C68F2C',suplemento_medio:'#D4A838',aireador:'#4E7A6A',aditivo_ph:'#8B5C28',aditivo_estructura:'#7A6B58',aditivo_micronutriente:'#2A6A7A',aditivo_arrancador:'#9B4F3A'};
  const groups={};
  recipe.forEach(r=>{
    const g=INGS.find(i=>i.id===r.id);
    if(!g) return;
    const role=g.role||'base_carbono';
    groups[role]=(groups[role]||0)+(parseFloat(r.p)||0);
  });
  const total=Object.values(groups).reduce((s,v)=>s+v,0);
  if(!total) return null;
  const entries=Object.entries(groups).sort((a,b)=>b[1]-a[1]);
  return(
    <div style={{marginBottom:16,padding:'14px 16px',background:'var(--paper-100)',border:'1px solid var(--border-soft)'}}>
      <div style={{fontFamily:"var(--font-body)",fontSize:10,letterSpacing:'.2em',textTransform:'uppercase',color:'var(--ink-500)',marginBottom:10}}>Composición por función</div>
      <div style={{height:18,display:'flex',borderRadius:2,overflow:'hidden',border:'1px solid rgba(0,0,0,.07)',marginBottom:10}}>
        {entries.map(([role,val],i)=>(
          <div key={i} title={`${ROLE_LABELS[role]||role}: ${val.toFixed(1)}%`}
            style={{width:`${(val/total)*100}%`,background:ROLE_COLORS[role]||'#888',transition:'width .4s'}}/>
        ))}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:'4px 14px'}}>
        {entries.map(([role,val],i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:9,height:9,background:ROLE_COLORS[role]||'#888',flexShrink:0,border:'1px solid rgba(0,0,0,.1)'}}/>
            <span style={{fontFamily:"var(--font-mono)",fontSize:11,color:'var(--ink-700)',fontWeight:500}}>
              {ROLE_LABELS[role]||role}&nbsp;<strong style={{color:'var(--ink-900)'}}>{val.toFixed(1)}%</strong>
            </span>
          </div>
        ))}
      </div>
    </div>
  );
};
