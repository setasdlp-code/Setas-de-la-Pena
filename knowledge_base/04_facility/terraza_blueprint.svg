<svg viewBox="0 0 1400 1050" xmlns="http://www.w3.org/2000/svg" font-family="'Century Gothic','Futura','Trebuchet MS','DejaVu Sans',sans-serif">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#d9c9a8" stroke-width="1"/>
    </pattern>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#8a6a3f" stroke-width="1.4"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b0492f"/>
    </marker>
    <style>
      .ink{stroke:#5b4327;fill:none;}
      .terra{stroke:#b0492f;fill:none;}
      .lbl{fill:#5b4327;font-size:15px;letter-spacing:1px;text-transform:uppercase;}
      .lblc{fill:#5b4327;font-size:15px;letter-spacing:1px;text-transform:uppercase;text-anchor:middle;}
      .dim{fill:#b0492f;font-size:14px;letter-spacing:1px;text-anchor:middle;}
      .eq{fill:#e6d9bd;stroke:#5b4327;stroke-width:1.5;}
      .tiny{fill:#5b4327;font-size:12px;letter-spacing:0.5px;text-anchor:middle;text-transform:uppercase;}
      .h1{fill:#5b4327;font-size:20px;letter-spacing:1px;text-transform:uppercase;}
      .h2{fill:#b0492f;font-size:13px;letter-spacing:1px;text-transform:uppercase;}
    </style>
  </defs>

  <!-- paper -->
  <rect x="0" y="0" width="1400" height="1050" fill="#efe4cf"/>
  <rect x="0" y="0" width="1400" height="1050" fill="url(#grid)" opacity="0.6"/>
  <rect x="22" y="22" width="1356" height="1006" class="terra" stroke-width="3"/>
  <rect x="30" y="30" width="1340" height="990" class="ink" stroke-width="1"/>

  <!-- ================= L-SHAPED PLAN =================
       Corridor (entrada/lobby): 250,150 380,150 380,420 250,420
       Main body: 250,420 770,420 790,700 230,660
       Top = 6.5 m (muro casa)  Bottom = 7 m (NORTE)  Right = 3.5 m  Left = 3 m -->
  <polygon points="250,150 380,150 380,420 770,420 790,700 230,660 250,420"
           fill="#f6efe0" class="ink" stroke-width="2"/>
  <!-- solid house wall opposite entrance (top of main body) -->
  <line x1="380" y1="420" x2="770" y2="420" class="terra" stroke-width="7"/>

  <!-- corridor = entrance + lobby = clean lab -->
  <text x="315" y="252" class="lblc" font-size="13">ENTRADA</text>
  <text x="315" y="270" class="lblc" font-size="13">+ LOBBY</text>
  <rect x="278" y="292" width="74" height="104" class="eq"/>
  <text x="315" y="330" class="tiny">LAB</text>
  <text x="315" y="345" class="tiny">LIMPIO</text>
  <text x="315" y="360" class="tiny">LAF / SAB</text>
  <!-- stairs symbol below/into corridor entry -->
  <g class="ink" stroke-width="1.3">
    <line x1="255" y1="170" x2="375" y2="170"/>
    <line x1="255" y1="188" x2="375" y2="188"/>
    <line x1="255" y1="206" x2="375" y2="206"/>
  </g>
  <text x="315" y="228" class="tiny">▲ ESCALERAS</text>

  <!-- ENCLOSURE against the 6.5 m solid house wall -->
  <polygon points="408,440 760,433 766,626 414,634" fill="#f0ddc9"
           stroke="#b0492f" stroke-width="2" stroke-dasharray="10 6"/>
  <text x="588" y="446" class="lblc" font-size="12">CERRAMIENTO LIGERO</text>

  <!-- incubadoras against the top wall -->
  <rect x="556" y="452" width="70" height="96" class="eq"/>
  <rect x="640" y="450" width="70" height="96" class="eq"/>
  <text x="626" y="565" class="tiny" text-anchor="middle" font-size="11">◂ INCUBADORAS</text>

  <!-- Martha tent -->
  <rect x="442" y="498" width="122" height="122" fill="#e3d3b2" stroke="#5b4327" stroke-width="1.8"/>
  <line x1="442" y1="498" x2="564" y2="620" class="ink" stroke-width="0.8"/>
  <line x1="564" y1="498" x2="442" y2="620" class="ink" stroke-width="0.8"/>
  <text x="503" y="552" class="lblc" font-size="12">MARTHA</text>
  <text x="503" y="568" class="lblc" font-size="12">TENT</text>
  <text x="503" y="588" class="tiny">FRUCTIF.</text>

  <!-- floor drain -->
  <circle cx="600" cy="596" r="12" class="eq"/>
  <line x1="591" y1="587" x2="609" y2="605" class="ink" stroke-width="1"/>
  <line x1="609" y1="587" x2="591" y2="605" class="ink" stroke-width="1"/>
  <text x="618" y="602" class="tiny" text-anchor="start">DESAGÜE</text>

  <!-- IP65 electrical box outside enclosure (right) -->
  <rect x="800" y="470" width="32" height="50" class="eq"/>
  <text x="800" y="538" class="tiny" text-anchor="middle" font-size="11">TABLERO</text>
  <text x="800" y="552" class="tiny" text-anchor="middle" font-size="11">IP65 + RCD</text>

  <!-- chimney / house vent duct on the left wall of main body -->
  <rect x="236" y="470" width="34" height="96" fill="url(#hatch)" class="ink" stroke-width="1.5"/>
  <text x="150" y="460" class="tiny" text-anchor="start">CHIMENEA /</text>
  <text x="150" y="476" class="tiny" text-anchor="start">VENT. CASA</text>

  <!-- airflow keep-away note (tent intake away from duct) -->
  <path d="M446,548 C380,548 320,540 276,528" class="terra" stroke-width="1.4"
        stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="368" y="612" class="tiny" font-size="11">TOMA DE AIRE LEJOS DEL DUCTO</text>

  <!-- baranda on the north (7 m) open edge -->
  <line x1="230" y1="660" x2="790" y2="700" class="terra" stroke-width="2"/>
  <g class="terra" stroke-width="1.4">
    <line x1="300" y1="665" x2="300" y2="680"/>
    <line x1="390" y1="672" x2="390" y2="687"/>
    <line x1="480" y1="678" x2="480" y2="693"/>
    <line x1="570" y1="685" x2="570" y2="700"/>
    <line x1="660" y1="691" x2="660" y2="706"/>
    <line x1="740" y1="697" x2="740" y2="712"/>
  </g>
  <text x="510" y="690" class="tiny">BARANDA (BORDE ABIERTO)</text>

  <!-- ================= DIMENSIONS ================= -->
  <!-- top 6.5 m -->
  <line x1="250" y1="118" x2="770" y2="118" class="terra" stroke-width="1"/>
  <line x1="250" y1="112" x2="250" y2="150" class="terra" stroke-width="1"/>
  <line x1="770" y1="112" x2="770" y2="420" class="terra" stroke-width="1"/>
  <text x="575" y="110" class="dim">6.50 m · MURO CASA</text>
  <!-- bottom 7 m NORTE -->
  <line x1="230" y1="748" x2="790" y2="748" class="terra" stroke-width="1"/>
  <line x1="230" y1="742" x2="230" y2="754" class="terra" stroke-width="1"/>
  <line x1="790" y1="742" x2="790" y2="754" class="terra" stroke-width="1"/>
  <text x="510" y="770" class="dim">7.00 m · LADO NORTE ▼</text>
  <!-- right 3.5 m -->
  <line x1="836" y1="420" x2="836" y2="700" class="terra" stroke-width="1"/>
  <line x1="830" y1="420" x2="842" y2="420" class="terra" stroke-width="1"/>
  <line x1="830" y1="700" x2="842" y2="700" class="terra" stroke-width="1"/>
  <text x="854" y="560" class="dim" transform="rotate(-90 854 560)">3.50 m</text>
  <!-- left 3 m -->
  <line x1="188" y1="420" x2="188" y2="660" class="terra" stroke-width="1"/>
  <line x1="182" y1="420" x2="194" y2="420" class="terra" stroke-width="1"/>
  <line x1="182" y1="660" x2="194" y2="660" class="terra" stroke-width="1"/>
  <text x="176" y="540" class="dim" transform="rotate(-90 176 540)">3.00 m</text>
  <!-- corridor size -->
  <text x="315" y="410" class="tiny">BRAZO EN L ≈ 1.6 × 3.4 m</text>

  <!-- ================= NORTH ARROW (points to 7 m / south of drawing) ================= -->
  <g transform="translate(150,850)">
    <circle cx="0" cy="0" r="34" class="ink" stroke-width="1.4"/>
    <polygon points="0,30 9,-6 0,2 -9,-6" fill="#b0492f"/>
    <text x="0" y="52" class="lblc" font-size="14">N</text>
  </g>

  <!-- ================= LEGEND ================= -->
  <rect x="978" y="150" width="392" height="470" fill="#f6efe0" class="ink" stroke-width="1.4"/>
  <rect x="978" y="150" width="392" height="40" fill="#b0492f"/>
  <text x="1174" y="177" class="lblc" fill="#efe4cf" font-size="16">CONVENCIONES</text>

  <g transform="translate(1002,222)">
    <rect x="0" y="-14" width="34" height="20" fill="#e6d9bd" stroke="#5b4327" stroke-width="1.5"/>
    <text x="52" y="1" class="lbl" font-size="13">Incubadora (gabinete)</text>
  </g>
  <g transform="translate(1002,270)">
    <rect x="0" y="-16" width="30" height="30" fill="#e3d3b2" stroke="#5b4327" stroke-width="1.5"/>
    <line x1="0" y1="-16" x2="30" y2="14" class="ink" stroke-width="0.8"/>
    <line x1="30" y1="-16" x2="0" y2="14" class="ink" stroke-width="0.8"/>
    <text x="52" y="3" class="lbl" font-size="13">Martha Tent (fructificación)</text>
  </g>
  <g transform="translate(1002,318)">
    <circle cx="14" cy="-4" r="11" fill="#e6d9bd" stroke="#5b4327" stroke-width="1.5"/>
    <text x="52" y="1" class="lbl" font-size="13">Desagüe de piso</text>
  </g>
  <g transform="translate(1002,364)">
    <rect x="0" y="-14" width="24" height="34" fill="#e6d9bd" stroke="#5b4327" stroke-width="1.5"/>
    <text x="52" y="6" class="lbl" font-size="13">Tablero IP65 + RCD</text>
  </g>
  <g transform="translate(1002,414)">
    <rect x="0" y="-14" width="30" height="26" fill="url(#hatch)" stroke="#5b4327" stroke-width="1.5"/>
    <text x="52" y="2" class="lbl" font-size="13">Ducto chimenea / vent. casa</text>
  </g>
  <g transform="translate(1002,462)">
    <line x1="0" y1="0" x2="34" y2="0" class="terra" stroke-width="6"/>
    <text x="52" y="4" class="lbl" font-size="13">Muro sólido casa (6.5 m)</text>
  </g>
  <g transform="translate(1002,510)">
    <rect x="0" y="-13" width="34" height="24" fill="none" stroke="#b0492f" stroke-width="2" stroke-dasharray="7 4"/>
    <text x="52" y="4" class="lbl" font-size="13">Cerramiento ligero propuesto</text>
  </g>
  <g transform="translate(1002,558)">
    <line x1="0" y1="0" x2="34" y2="0" class="terra" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
    <text x="52" y="4" class="lbl" font-size="13">Flujo de aire a controlar</text>
  </g>
  <g transform="translate(1002,600)">
    <line x1="0" y1="0" x2="34" y2="0" class="terra" stroke-width="2"/>
    <text x="52" y="4" class="lbl" font-size="13">Baranda (borde abierto)</text>
  </g>

  <!-- ================= TITLE BLOCK ================= -->
  <rect x="978" y="700" width="392" height="270" fill="#f6efe0" class="ink" stroke-width="1.4"/>
  <line x1="978" y1="760" x2="1370" y2="760" class="ink" stroke-width="1"/>
  <rect x="1338" y="713" width="18" height="18" fill="#b0492f"/>
  <text x="1002" y="740" class="h1">SETAS DE LA PEÑA</text>
  <text x="1002" y="792" class="h2">Laboratorio I+D — Planta Terraza (L)</text>
  <text x="1002" y="820" class="lbl" font-size="13">Entrada + lobby en L; lab limpio</text>
  <text x="1002" y="842" class="lbl" font-size="13">en el brazo de la entrada</text>
  <text x="1002" y="874" class="lbl" font-size="13">Norte = lado de 7 m</text>
  <text x="1002" y="900" class="lbl" font-size="13">Escala ≈ 1:80 · cuadrícula 0.5 m</text>
  <text x="1002" y="926" class="lbl" font-size="13">Fecha 2026-07-05</text>
  <text x="1002" y="952" class="tiny" text-anchor="start">Dibujo esquemático · estilo Prairie / F. Ll. Wright</text>

  <!-- plan title -->
  <text x="510" y="80" class="lblc" font-size="20" fill="#b0492f">PLANTA EN L — TERRAZA / AZOTEA</text>
</svg>
